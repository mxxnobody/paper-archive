tion of the model is conducted using the US later stage rounds of financing deals from PitchBook. Numerical results of the model reveal an ‘S’-shaped relationship between the portfolio’s payoff and investment period length, demonstrating the importance of timely termination for maximizing returns. Furthermore, a longer period with stricter exit multiples leads to a higher DPI payoff due to increased selectivity. However, excessively high exit multiples may reduce exits, hampering the portfolio’s overall payoff. Finally, portfolios with positive correlation perform better than the uncorrelated ones. These findings shed light on VC portfolio dynamics, providing insights for informed decision-making in staged financing investments.", "cited_by": 2, "concepts": ["Venture capital", "Finance", "Portfolio", "Investment (military)", "Business", "Social venture capital", "Period (music)", "Capital investment", "Investment portfolio", "Investment strategy", "Economics", "Financial system", "Monetary economics", "Market liquidity", "Acoustics", "Politics", "Political science", "Law", "Physics"], "relevance": 100, "reason": "키워드 2개 일치 (Venture Capital, Staged Financing) · 핵심 저널 · 인용 2", "is_canon": false, "summary": {"summary": "In this paper, we analyze the investment and exit decisions in late-stage Venture Capital (VC) rounds of financing portfolios. We utilize a stochastic programming framework to minimize the investment period and find the optimal investment strategy for the VC portfolio under a predefined payoff.…", "key_result": "", "dependent_var": "단계적 투자, exit", "independent_var": "", "method": "", "caveats": "상관≠인과 주의"}, "_key": "doi:10.1080/1351847x.2025.2532548", "tier": 2}, {"title": "Complementary funding: how location links crowdfunding and venture capital", "doi": "10.1007/s11187-025-01106-2", "authors": ["Torben Klarl", "Alexander S. Kritikos", "Knarik Poghosyan"], "year": 2025, "venue": "Small Business Economics", "url": "https://doi.org/10.1007/s11187-025-01106-2", "abstract": "Abstract While Equity Crowdfunding (ECF) platforms are a virtual space for raising funds, geography remains relevant. To determine how location matters for entrepreneurs using equity crowdfunding (ECF), we analyze the spatial distribution of successful ECF campaigns and the spatial relationship between ECF campaigns and traditional investors, such as banks and venture capitalists (VCs). Using data from the two leading German platforms – Companisto and Seedmacht – we employ spatial eigenvalue filtering and negative binomial estimations. In addition, we introduce an event study based on the implementation of the Small Investor Protection Act in Germany allowing us to obtain causal evidence. Our combined analysis reveals a significant geographic concentration of successful ECF campaigns in some, but not all, dense areas. ECF campaigns tend to cluster in dense areas with VC activity, while they are less prevalent in dense areas with high banking activity and are rarely found in rural areas. Thus, rather than closing the so-called regional funding gap, our results suggest that, from a spatial perspective, ECF fills the gap when firms in dense areas seek external financing below the minimum equity threshold offered by VCs and when there are few banks offering loans. Plain English Summary Equity crowdfunding is not closing the regional funding gap — it thrives where venture capital already flows. We study where successful equity crowdfunding campaigns happen in Germany and how their locations relate to those of traditional investors like banks and venture capitalists. Using data from the country’s two main crowdfunding platforms, we find that geography still matters, although equity is offered through digital marketplaces: crowdfunding campaigns cluster in urban areas with strong venture capital activity but are less common in rural regions or in places with many banks. Our findings imply that equity crowdfunding complements venture capital more than it replaces it — especially in cities — and is unlikely to solve funding challenges in under-served regions. This has important implications for policy, suggesting that additional measures are needed if crowdfunding is to help bridge regional finance gaps for small businesses.", "cited_by": 2, "concepts": ["Venture capital", "Entrepreneurship", "Business", "Social venture capital", "Seed money", "Equity crowdfunding", "Entrepreneurial finance", "Capital (architecture)", "Finance", "Marketing", "Business administration", "Archaeology", "History"], "relevance": 100, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 핵심 저널 · 인용 2", "is_canon": false, "summary": {"summary": "Thus, rather than closing the so-called regional funding gap, our results suggest that, from a spatial perspective, ECF fills the gap when firms in dense areas seek external financing below the minimum equity threshold offered by VCs and when there are few banks offering loans.", "key_result": "Thus, rather than closing the so-called regional funding gap, our results suggest that, from a spatial perspective, ECF fills the gap when firms in dense areas seek external financing below the minimum equity threshold offered by VCs and when there are few banks offering loans.", "dependent_var": "", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.1007/s11187-025-01106-2", "tier": 2}, {"title": "The role of decentralized and traditional entrepreneurial finance in startups financing: an analysis of ICO-funded startups", "doi": "10.1007/s11187-025-01153-9", "authors": ["Alessia Pedrazzoli", "Paola Bongini", "Monica Rossolini", "Silvio Vismara"], "year": 2025, "venue": "Small Business Economics", "url": "https://doi.org/10.1007/s11187-025-01153-9", "abstract": "Abstract The rise of Decentralized Finance (DeFi) has introduced new fundraising mechanisms for startups. This study examines the interplay between Initial Coin Offerings (ICOs) and traditional entrepreneurial finance investors. Our findings document that while ICO funding amounts do not predict future funding success, prior business angel investment significantly increases the likelihood of securing follow-on funding. Co-investment by crypto funds during the ICO enhances follow-on funding opportunities, particularly for firms backed by hedge-style crypto investors. This research contributes to the entrepreneurial finance literature by examining how blockchain-based financing mechanisms integrate into the broader venture funding ecosystem.", "cited_by": 2, "concepts": ["Entrepreneurial finance", "Entrepreneurship", "Finance", "Venture capital", "Business", "Investment (military)", "Access to finance", "Corporate finance", "Economics", "Public finance", "Business model", "New Ventures"], "relevance": 100, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 핵심 저널 · 인용 2", "is_canon": false, "summary": {"summary": "Our findings document that while ICO funding amounts do not predict future funding success, prior business angel investment significantly increases the likelihood of securing follow-on funding.", "key_result": "Our findings document that while ICO funding amounts do not predict future funding success, prior business angel investment significantly increases the likelihood of securing follow-on funding.", "dependent_var": "후속투자, 펀드레이징", "independent_var": "", "method": "", "caveats": "예측≠인과 주의"}, "_key": "doi:10.1007/s11187-025-01153-9", "tier": 2}, {"title": "Political alignment in entrepreneurial teams: Homophily in venture formation and associations with startup success", "doi": "10.1002/smj.70044", "authors": ["Balázs Kovács", "Tim Sels"], "year": 2025, "venue": "Strategic Management Journal", "url": "https://doi.org/10.1002/smj.70044", "abstract": "Abstract Research Summary We examine political affiliation's role in venture team formation and success. Using data from Crunchbase and L2 on 1125 US‐based startups, we investigate political homophily in team assembly and its association with startup outcomes. Our analysis reveals strong political homogeneity in founding teams: teams with similar political views form more frequently than diverse teams, even after controlling for founders' gender, age, location, and industry. This political homophily relates to venture performance. Startups with politically heterogeneous founding teams are more likely to shut down. Across additional performance measures (capital funding, employee size, Crunchbase rankings), we observe directionally consistent associations with worse outcomes, though these secondary findings vary in robustness. These findings highlight the dual role of founders' political affiliations: their relationship with team composition and startup performance. Managerial Summary Our study examines political diversity's association with startup team formation and venture success. Analyzing data from 1125 US‐based startups, we discovered a strong tendency for teams to form based on political similarity. Individuals with similar political views prefer starting companies together, even when accounting for age, gender, location, and industry. Startups with politically diverse founding teams are more likely to shut down. These teams also tend to receive less funding, have fewer employees, and exhibit worse Crunchbase rankings, although these patterns are less consistent than the survival effect. For entrepreneurs and investors, these findings highlight the need to balance team cohesion against diverse perspectives. Business practitioners should be aware of these dynamics when forming teams or developing management strategies, particularly in a politically charged environment.", "cited_by": 2, "concepts": ["Homophily", "Politics", "Entrepreneurship", "Public relations", "Marketing", "Shut down", "Team composition", "Biology and political orientation", "Business", "Venture capital", "Association (psychology)", "Political economy", "Upper echelons", "Cohesion (chemistry)", "Political risk", "Economics", "Multilevel model", "Political science", "Sociology", "Qualitative property", "Entrepreneurial finance", "Opportunity structures", "Strategic management"], "relevance": 100, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 핵심 저널 · 인용 2", "is_canon": false, "summary": {"summary": "Abstract Research Summary We examine political affiliation's role in venture team formation and success. Using data from Crunchbase and L2 on 1125 US‐based startups, we investigate political homophily in team assembly and its association with startup outcomes.…", "key_result": "", "dependent_var": "생존", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.1002/smj.70044", "tier": 2}, {"title": "African Startup Accelerators: How University Partnerships Signal Venture Quality and Drive Funding Growth Amid Capital Scarcity", "doi": "10.11648/j.sjbm.20251304.12", "authors": ["Stanley Mukasa", "Sixbert Sangwa"], "year": 2025, "venue": "Science Journal of Business and Management", "url": "https://doi.org/10.11648/j.sjbm.20251304.12", "abstract": "&amp;lt;i&amp;gt;Background.&amp;lt;/i&amp;gt; African startups operate amid acute capital scarcity and fragmented institutions, which complicates credible quality revelation to investors. &amp;lt;i&amp;gt;Purpose.&amp;lt;/i&amp;gt; Focusing on the &amp;lt;i&amp;gt;venture&amp;lt;/i&amp;gt; as the unit of analysis, this study investigates how milestones pursued inside university-affiliated accelerators function as signals of venture quality under scarcity, and how entrepreneurial behaviors shape the clarity and credibility of those signals. &amp;lt;i&amp;gt;Design/methodology/approach.&amp;lt;/i&amp;gt; We track 17 technology ventures across East- and West-African university accelerators over 185 venture-quarters, combining venture-level panel regressions, event-study analysis, and fuzzy-set QCA. Two composite measures—the Governance-Readiness Index and the Signal-Portfolio Index—capture internal capability building and externally legible signals. &amp;lt;i&amp;gt;Findings.&amp;lt;/i&amp;gt; Ventures graduating from university-affiliated accelerators secured roughly three times more equity than matched non-accelerated peers, with heterogeneity explained by milestone attainment and the breadth/strength of signal portfolios. We articulate a signal–noise paradox: effectuation/bricolage behaviors enable survival and progress under constraint yet can appear ambiguous to investors, attenuating signal clarity unless paired with governance readiness and externally validated milestones. &amp;lt;i&amp;gt;Originality/value.&amp;lt;/i&amp;gt; The paper elevates signaling theory as the primary lens for early-stage ventures in emerging-market contexts, treats effectuation/bricolage as behavioral mechanisms, and situates staged financing as process logic and triple-helix/institutional-voids as contextual moderators. In doing so, it refines entrepreneurial signaling theory for scarcity contexts and offers actionable diagnostics for accelerators and policymakers designing inclusive, quality-assuring programs.", "cited_by": 1, "concepts": ["CLARITY", "Scarcity", "Quality (philosophy)", "Corporate governance", "Economics", "Venture capital", "Entrepreneurship", "Equity (law)", "Credibility", "New Ventures", "Finance", "Agile software development", "Business", "Capital (architecture)", "Dividend", "Economic shortage", "Dominance (genetics)", "Window of opportunity", "Function (biology)", "Process (computing)", "Marketing", "Constraint (computer-aided design)", "Commercialization", "Human capital", "Industrial organization", "Ambiguity", "Initial public offering", "Retrenchment", "Accounting", "Milestone"], "relevance": 100, "reason": "키워드 3개 일치 (Venture Capital, Corporate Governance, Staged Financing) · 인용 1", "is_canon": false, "summary": {"summary": "&amp;lt;i&amp;gt;Background.&amp;lt;/i&amp;gt; African startups operate amid acute capital scarcity and fragmented institutions, which complicates credible quality revelation to investors. &amp;lt;i&amp;gt;Purpose.&amp;lt;/i&amp;gt; Focusing on the &amp;lt;i&amp;gt;venture&amp;lt;/i&amp;gt; as the u…", "key_result": "", "dependent_var": "단계적 투자, 생존", "independent_var": "성장, 기업지배구조, 신호", "method": "패널분석, 회귀분석", "caveats": ""}, "_key": "doi:10.11648/j.sjbm.20251304.12", "tier": 2}, {"title": "Three essays on social impact venture capital", "doi": "10.5287/ora-noxgrz6r5", "authors": ["Yunus Emre IŞIK"], "year": 2025, "venue": "Oxford University Research Archive (ORA) (University of Oxford)", "url": "https://doi.org/10.5287/ora-noxgrz6r5", "abstract": "This thesis explores how social impact-oriented venture capital (IVC) firms integrate the pursuit of social impact with financial objectives and how this dual focus shapes their investment decisions and outcomes. Each of the three papers contributes to this broader exploration. The first paper uses signalling theory to compare how traditional VCs, governmental VCs, and IVCs interpret signals of financial and social potential from new ventures. The findings show that while traditional VCs prioritise financial signals and governmental VCs focus on social signals, IVCs uniquely treat both financial and social signals as complementary. It provides an example of how dual motivations shape investment decision-making. The second paper investigates the concept of additionality. It demonstrates that IVCs possess expertise to identify and fund social ventures overlooked by traditional VCs. In this way, IVCs play a catalytic role. Not only do they fund otherwise neglected ventures, but their involvement also encourages follow-on investment from traditional VCs. The third paper explores the regional impacts of VC activity and exposes a dark side of traditional VC - it is associated with rising income inequality in targeted regions. In contrast, IVCs avoid these negative distributive effects. However, they produce lower gains in local economic growth than traditional VCs, revealing a trade-off in pursuing both financial and social objectives. Taken together, these three studies provide an empirical and theoretical basis for understanding how IVCs operate, the extent to which they realise their dual objectives, and the broader societal implications of their investment strategies.", "cited_by": 0, "concepts": ["Dual (grammatical number)", "Investment (military)", "Economics", "Finance", "Social capital", "Investment management", "Inequality", "Focus (optics)", "Venture capital", "Impact investing", "Public economics", "Social impact", "Social inequality", "Assets under management", "Dual role", "Capital (architecture)", "Business", "Social entrepreneurship", "Entrepreneurial finance", "Financial instrument", "Collateral", "Empirical research", "Social benefits", "Economic inequality", "Social venture capital", "Financial capital", "Manager of managers fund", "Tracking (education)"], "relevance": 100, "reason": "키워드 3개 일치 (Venture Capital, Entrepreneurial Finance, Follow-on Investment)", "is_canon": false, "summary": {"summary": "The findings show that while traditional VCs prioritise financial signals and governmental VCs focus on social signals, IVCs uniquely treat both financial and social signals as complementary.", "key_result": "The findings show that while traditional VCs prioritise financial signals and governmental VCs focus on social signals, IVCs uniquely treat both financial and social signals as complementary.", "dependent_var": "후속투자", "independent_var": "성장, 신호", "method": "", "caveats": ""}, "_key": "doi:10.5287/ora-noxgrz6r5", "tier": 2}, {"title": "Innovative Startup Financing Models: Venture Capital and Crowdfunding", "doi": "10.32479/ijefi.19264", "authors": ["Snizhana Sukachova", "Yevstakhii Vytrykhovskyi", "Volodymyr Кorneev", "Mykola Gaponiuk", "Tetiana Borodenko"], "year": 2025, "venue": "International Journal of Economics and Financial Issues", "url": "https://doi.org/10.32479/ijefi.19264", "abstract": "In Ukraine, the lack of efficient financing mechanisms impedes the growth of startups. Therefore, venture capital and crowdfunding models need to be compared. The main task of the research is to assess the efficiency of using these financing models in Ukraine during 2024. The study uses a mixed regression analysis method, case studies about successful Ukrainian startups, and SWOT analysis to compare these financing mechanisms. The results show that venture capital has a strong positive impact on startup success (β = 0.72, p &lt; 0.01), whereas crowdfunding is positively related (β = 0.54, p &lt; 0.05). However, it is with higher risk. In addition, the results point out that the involvement of investors and the amount of time needed to raise funds are essential factors for financing success. As laid out in the SWOT analysis, the most significant strengths of venture capital are strategic mentorship and scalability, while crowdfunding can help you better validate the market. The hybrid financing framework with venture capital’s structured investment and crowdfunding’s accessibility should be used as a key policy implication to enhance startup growth in Ukraine.", "cited_by": 0, "concepts": ["Venture capital", "Business", "Entrepreneurial finance", "Finance", "Social venture capital", "Start up", "Capital (architecture)", "Business administration", "Geography", "Archaeology"], "relevance": 100, "reason": "키워드 3개 일치 (Venture Capital, Entrepreneurial Finance, Startup Growth)", "is_canon": false, "summary": {"summary": "The results show that venture capital has a strong positive impact on startup success (β = 0.72, p &lt; 0.01), whereas crowdfunding is positively related (β = 0.54, p &lt; 0.05).", "key_result": "The results show that venture capital has a strong positive impact on startup success (β = 0.72, p &lt; 0.01), whereas crowdfunding is positively related (β = 0.54, p &lt; 0.05).", "dependent_var": "", "independent_var": "스타트업 성장, 성장", "method": "회귀분석", "caveats": ""}, "_key": "doi:10.32479/ijefi.19264", "tier": 2}, {"title": "Entrepreneurial Finance: Bridging Innovation and Capital for Sustainable Growth", "doi": "10.71097/ijaidr.v16.i1.1416", "authors": ["Dr. Sushma Karnati -"], "year": 2025, "venue": "Journal of Advances in Developmental Research", "url": "https://doi.org/10.71097/ijaidr.v16.i1.1416", "abstract": "This paper explores the vital role of entrepreneurial finance in fostering innovation, while addressing the challenges entrepreneurs face in securing financial resources. It examines the various funding options available to startups and small businesses, proposes strategies to improve access to entrepreneurial finance, and evaluates the impact of financial decisions on venture sustainability. Entrepreneurial finance serves as a key enabler of innovation, providing necessary resources for startups to develop and scale new ideas, especially in resource-constrained environments. Financial instruments such as venture capital and angel investments play a critical role in supporting high-risk ventures that would otherwise struggle to secure funding. However, entrepreneurs often encounter barriers such as limited access to capital markets, stringent lending criteria, and the high perceived risk of startups. The paper identifies geographic disparities and financial literacy as additional challenges faced by entrepreneurs in accessing funding. It further explores various funding options, including traditional bank loans, equity-based funding (venture capital and angel investments), crowdfunding, peer-to-peer lending, and government grants. Each funding option presents trade-offs related to cost, control, and scalability. The analysis also highlights the significant impact of financial decisions on the long-term sustainability of ventures. Effective financial planning and prudent decision-making are essential for maintaining operational stability and achieving growth. Entrepreneurs must balance risk and control while aligning financial decisions with their growth objectives. The paper concludes by emphasizing the importance of collaborative efforts among policymakers, investors, and educators to build a robust entrepreneurial ecosystem that fosters innovation, inclusivity, and sustainability.", "cited_by": 0, "concepts": ["Venture capital", "Finance", "Business", "Enabling", "Government (linguistics)", "Access to finance", "Financial capital", "Bridging (networking)", "Entrepreneurship", "Entrepreneurial finance", "Capital (architecture)", "Equity (law)", "Financial literacy", "Sustainability", "Financial services", "Economics", "Financial stability", "Face (sociological concept)", "Financial innovation", "Business risks", "Financial risk", "Corporate governance", "Social venture capital", "Sustainable growth rate", "Scale (ratio)", "Control (management)", "Financial inclusion", "Risk management", "FinTech", "Small business", "Asset (computer security)"], "relevance": 100, "reason": "키워드 3개 일치 (Venture Capital, Entrepreneurial Finance, Corporate Governance)", "is_canon": false, "summary": {"summary": "This paper explores the vital role of entrepreneurial finance in fostering innovation, while addressing the challenges entrepreneurs face in securing financial resources. It examines the various funding options available to startups and small businesses, proposes strategies to improve access to entr…", "key_result": "", "dependent_var": "", "independent_var": "성장", "method": "", "caveats": ""}, "_key": "doi:10.71097/ijaidr.v16.i1.1416", "tier": 2}, {"title": "Crowdfunding as an Alternative Financing Mechanism for Early-Stage Entrepreneurs: A Pathway to Financial Inclusion and Startup Growth the Democratization of Entrepreneurial Finance", "doi": "10.63680/ijsate0825021.35", "authors": ["S Sudhanva", "Parul Tandan"], "year": 2025, "venue": "International Journal of Science Architecture Technology and Environment", "url": "https://doi.org/10.63680/ijsate0825021.35", "abstract": "Crowdfunding as an Alternative Financing Mechanism for Early-Stage Entrepreneurs: A Pathway to Financial Inclusion and Startup Growth the Democratization of Entrepreneurial Finance Sudhanva S1*, Dr. Parul Tandan2 Abstract In recent years, crowdfunding has emerged as a disruptive and democratic financing mechanism that enables early-stage entrepreneurs to raise capital beyond traditional banking and venture capital channels. […]", "cited_by": 0, "concepts": ["Democratization", "Financial inclusion", "Finance", "Mechanism (biology)", "Access to finance", "Business", "Economics", "Financial system", "Financial services", "Political science", "Democracy", "Epistemology", "Politics", "Law", "Philosophy"], "relevance": 100, "reason": "키워드 3개 일치 (Venture Capital, Entrepreneurial Finance, Startup Growth)", "is_canon": false, "summary": {"summary": "Crowdfunding as an Alternative Financing Mechanism for Early-Stage Entrepreneurs: A Pathway to Financial Inclusion and Startup Growth the Democratization of Entrepreneurial Finance Sudhanva S1*, Dr. Parul Tandan2 Abstract In recent years, crowdfunding has emerged as a disruptive and democratic finan…", "key_result": "", "dependent_var": "", "independent_var": "스타트업 성장, 성장", "method": "", "caveats": ""}, "_key": "doi:10.63680/ijsate0825021.35", "tier": 2}, {"title": "Guest editorial: Digital entrepreneurial finance and new approaches to venture funding", "doi": "10.1108/jsbed-06-2025-610", "authors": ["Antonio Salvi", "Carmen Gallucci", "Enrico Battisti", "Rosalia Santulli", "Stefano Filomeni"], "year": 2025, "venue": "Journal of Small Business and Enterprise Development", "url": "https://doi.org/10.1108/jsbed-06-2025-610", "abstract": "Over the past decades, thanks to a continuous process of digitalization, the financial industry has witnessed the advent and growth of new providers alongside traditional intermediaries, experiencing radical changes across all areas of service provision (e.g. Alalwan et al., 2024; Bertoni et al., 2022; Gomber et al., 2017). The very essence of finance and banking—namely, lending and capital provision—has been particularly and deeply affected by digital transformation (e.g. Chen et al., 2019; Cong and He, 2019; Thakor, 2020; Battisti et al., 2022), as the search for funding by start-ups, new entrepreneurial initiatives, and well-established micro, small and medium-sized enterprises (MSMEs) (e.g. Beltrame et al., 2023; Fadil and St-Pierre, 2021). The COVID-19 pandemic further accelerated digitalization processes (Boot et al., 2021) and challenged traditional sources of capital that supported entrepreneurs (e.g. Howell et al., 2020; Rao et al., 2024).However, it remains unclear whether this digital revolution represents a threat or an opportunity for enterprises seeking funding. On the one hand, it introduces new types of financial sources and reduces the time needed to secure financing; on the other hand, the proliferation of innovative funding sources for new ventures has substantially increased the complexity of the start-up financing ecosystem (Bertoni et al., 2022). Therefore, the effect of digitalization on entrepreneurial finance—and more broadly, on the sources of funding for small and medium-sized enterprises—deserves further investigation.This Special Issue sought contributions that helped better understand the new global landscape of the entrepreneurial finance ecosystem by exploring in depth the role played by digitalization, artificial intelligence and machine learning. The aim was to provide insights, pathways, and tools to financial and management scholars, as well as to CEOs, CFOs, owners of MSMEs, entrepreneurs, start-up leaders and new financial intermediaries. We accepted papers from diverse epistemological, theoretical and methodological backgrounds for this Special Issue.The following section presents a synopsis of the contributions included in this Special Issue.This Special Issue comprises ten papers from different fields, each offering novel, informative content and implications for scholars and practitioners around the world.In particular, our Special Issue commences by setting a broad analytical foundation for digital finance in the small business context. Modina et al. (2025) provide this essential overview in their paper “Digital finance for SMEs and startups: a bibliometric analysis and future research direction”. Their comprehensive bibliometric review meticulously maps the academic landscape of digital finance concerning SMEs and startups, identifying key trends, influential authors and thematic clusters. This work not only offers a foundational understanding but also critically pinpoints existing research gaps, charting promising future directions for studies into the practical implementation and tangible impact of digital financial tools on entrepreneurial growth and sustainability.Building on this pervasive influence of digitalization, Rehman et al. (2025) delve into the specific nexus between digital entrepreneurship and environmental performance (EP) within manufacturing SMEs, as explored in “Digital entrepreneurship! Nexus among industry 4.0 enablers, environmental dynamism and SMEs environmental performance: a mediated-moderated perspectives”. Their mediated-moderated model reveals how digital technologies and digital organizational culture influence EP, with innovation capacity as a crucial mediator, and perceived environmental volatility alongside green strategic intent as significant moderators. This study offers valuable insights into how SMEs can strategically harness digital advancements for both operational efficiency and environmental sustainability.Transitioning from the general impact of digitalization, several papers in this issue focus on innovative financing mechanisms and their implications for micro and small businesses. Singh et al. (2025a) address the perennial concern of access to finance for Indian MSMEs in their paper “Access to finance and its impact on operational efficiency of MSMEs: mediating role of entrepreneurial personality and self-efficacy”. Their research highlights how access to finance impacts operational efficiency, crucially identifying the mediating role of entrepreneurial self-efficacy (ESE) and entrepreneurial personality, underscoring the pivotal role of individual psychological attributes. Expanding on alternative financing, Singh et al. (2025b) assess entrepreneurial business performance (EBP) through the dynamic capability and technology–organization–environment (TOE) frameworks, specifically examining the moderating role of crowdfunding support, in “Assessing the entrepreneurial business performance from a dynamic capability and TOE framework: moderating role of crowdfunding support”. Their model demonstrates how ventures can bolster performance by effectively leveraging dynamic capabilities within technological and organizational contexts, often amplified by crowdfunding’s flexibility. Further exploring novel financial instruments, Bužinskė et al. (2025) address a critical gap in green finance by modeling the application of green mini-bonds for environmentally beneficial projects, with a practical case study on municipal waste reduction, in “Modelling financing mechanisms using mini bonds for green and zero-waste projects”. Their analysis provides a robust framework for policymakers and organizations seeking innovative financial instruments to support sustainable development.However, the rapid ascent of new financial technologies is not without its complexities and potential pitfalls. This issue also critically examines the “dark side” of these innovations. Sestino et al. (2025) investigate this aspect in their paper “The ‘dark side’ and negative consequences of cryptocurrencies usage for unethical purposes as barriers to invest in Middle East and African (MEA) countries”. Their explorative research highlights how the use of cryptocurrencies for illicit activities such as money laundering and terrorism financing poses significant barriers to legitimate investment in MEA countries, emphasizing the urgent need for robust regulatory frameworks. Complementing this, the evolving landscape of public market access for digital firms is explored by Anconetani et al. (2025) in “Are SPACs a good investment deal for investors? A performance comparison between SPACS vs IPOs”. Their comparative study rigorously analyzes the post-business combination performance of special purpose acquisition companies (SPACs) against traditional initial public offerings (IPOs) within the digital sector. Their findings indicate that SPACs generally underperform matched IPOs in both operating and stock market metrics, offering crucial insights for investors and entrepreneurs weighing this rapid public market route against its inherent risks. The resilience of emerging financial instruments during global shocks is further addressed by Ballis et al. (2025) in “The impact of COVID-19 first wave on cryptocurrencies and G7 stock markets”. Their paper investigates the differential impacts of the COVID-19 pandemic’s initial wave on cryptocurrency markets versus traditional G7 stock markets, utilizing a difference-in-differences methodology, shedding light on the evolving role of cryptocurrencies during periods of high uncertainty.Finally, we delve deeper into the technological underpinnings of digital finance and the human element crucial for its success within entrepreneurial ventures. Robusti et al. (2025) provide a systematic literature review on the transformative potential of blockchain technology and smart contracts in digital entrepreneurial finance and venture funding, in their paper “Blockchain and smart contracts: transforming digital entrepreneurial finance and venture funding”. Their analysis highlights how these technologies enhance transparency, security, and efficiency, revealing their capacity to significantly disrupt traditional funding models through automated contract execution and reduced administrative overheads, fostering a more decentralized and efficient financial ecosystem for startups. Concluding this insightful issue, Del Sarto et al. (2025) address a notable research gap by investigating the critical impact of team diversity on the success of initial coin offerings (ICOs) in their paper “The importance of team diversity in initial coin offerings (ICO) success”. By compiling a comprehensive database and employing econometric modeling, their study demonstrates that diverse teams – those encompassing a wider array of skills, experiences, and perspectives – are positively correlated with ICO success. This offers invaluable strategic insights for both entrepreneurs launching projects and investors navigating the burgeoning and increasingly competitive cryptocurrency funding landscape.In sum, the papers presented in this Special Issue collectively offer a rich tapestry of research, highlighting the multifaceted nature of digital entrepreneurial finance. The accepted papers provide a foundational understanding of current trends, expose inherent challenges and propose innovative solutions, thereby contributing significantly to both academic discourse and practical application in this vital field. The guest editors of this Special Issue hope that this collection will stimulate further research and guide practitioners in navigating the complexities and seizing the opportunities that lie at the intersection of digital innovation, finance and sustainability.Lastly, the guest editors would like to express their deep gratitude to the Editor-in-Chief of the Journal, Prof. Patrick J. Murphy, for his unwavering support and for granting us the outstanding opportunity to lead this Special Issue; his guidance and trust have been instrumental throughout the entire editorial process. We also sincerely thank the anonymous reviewers for their valuable time and constructive feedback, as well as all the authors who submitted their contributions and helped make t kmann", "Paul P. Momtaz"], "year": 2024, "venue": "Journal of Business Venturing Insights", "url": "https://doi.org/10.1016/j.jbvi.2024.e00498", "abstract": "Institutional investors improve the environmental, social, and governance (ESG) performance of small- and medium-sized enterprises (SMEs). Our difference-in-differences framework shows that the backing from private equity and venture capital funds leads to an increase in SMEs’ externally validated ESG scores compared to their matched non-investor-backed peers. Consistent with “ESG-as-insurance” theory, the ESG performance of SMEs with a higher probability of failure is more likely to benefit from the backing of institutional investors. This positive effect is heterogeneous; while SMEs with high ex-ante ESG performance further improve their ESG performance following institutional investor backing, SMEs with low ex-ante ESG performance are unlikely to implement any improvements. Entrepreneurial finance seems to help sustainable entrepreneurs transform into “sustainability champions,” while neglecting the betterment of non-sustainable SMEs. • We employ a difference-in-differences framework to identify the causal effect of institutional investors on portfolio firms' ESG performance. • Venture capital and private equity funds improve small and medium-sized enterprises' (SMEs)’ ESG performance, consistent with delegated philanthropy theory. • Institutional investors improve ESG performance more in SMEs with a higher risk of failure, consistent with sustainability-as-insurance theory. • The positive effect of institutional investor backing on ESG performance is mainly driven by SMEs with pronounced pre-backing ESG orientation.", "cited_by": 23, "concepts": ["Business", "Sustainability", "Entrepreneurship", "Entrepreneurial finance", "Finance", "Financial system", "Biology", "Ecology"], "relevance": 100, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 핵심 저널 · 인용 23", "is_canon": false, "summary": {"su ss Angels’ Investment Practices", "doi": "10.1111/1467-8551.12526", "authors": ["Vincenzo Capizzi", "Annalisa Croce", "Francesca Tenca"], "year": 2021, "venue": "British Journal of Management", "url": "https://doi.org/10.1111/1467-8551.12526", "abstract": "Abstract In this paper, we shed light on interactions among the various investors operating within the entrepreneurial finance ecosystem. Specifically, we aim to investigate what business angel (BA) investment practices are correlated with follow‐on venture capital (VC) financing, and uncover the strategies that determine a complementary‐based or a substitution‐based relationship with VCs. We analysed a sample of 176 companies that received a BA investment during 2008–2016 and collected financial data over a 10‐year period after the BA investment. The data examined indicate that BAs’ selectivity, as measured by their rejection rate, and BAs’ affiliation to an angel network, are positively related with the probability of raising follow‐on VC financing. However, a high level of BAs’ monitoring activity negatively influences the probability of obtaining VC funding. Interestingly, BA networks do affect this relationship. The positive impact of BAs’ rejection rate is informative for VC decisions if the BA does not invest through a network. Conversely, a high level of monitoring may convey a negative signal for VC, particularly if the BA is affiliated to a network. These results extend our knowledge of the investment practices of BAs and their role in allowing angel‐backed companies to raise follow‐on VC financing.", "cited_by": 58, "concepts": ["Venture capital", "Investment (military)", "Finance", "Relevance (law)", "Business", "Sample (material)", "Social venture capital", "Affect (linguistics)", "Economics", "Political science", "Chemistry", "Politics", "Chromatography", "Law", "Philosophy", "Linguistics"], "relevance": 100, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 핵심 저널 · 인용 58", "is_canon" ing algorithms to the Crunchbase database. We highlight the main research goals that can be addressed and then we review all the variables and algorithms used for each goal. For each machine learning algorithm, we analyze the respective performance metrics to identify a baseline model. This study aims to be a reference for researchers and practitioners on the use of machine learning as an effective tool to support decision-making processes in equity investments.", "cited_by": 24, "concepts": ["Big data", "Computer science", "Data science", "Business", "Finance", "Data mining"], "relevance": 100, "reason": "키워드 3개 일치 (Venture Capital, Entrepreneurial Finance, Machine Learning) · 인용 24", "is_canon": false, "summary": {"summary": "For equity investors the identification of ventures that most likely will achieve the expected return on investment is an extremely complex task. To select early-stage companies, venture capitalists and business angels traditionally rely on a mix of assessment criteria and their own experience.…", "key_result": "", "dependent_var": "", "independent_var": "머신러닝", "method": "머신러닝", "caveats": "예측≠인과 주의"}, "_key": "doi:10.1561/0300000099", "tier": 2}, {"title": "Public Entrepreneurial Finance Around the Globe", "doi": "10.2139/ssrn.3838511", "authors": ["Jessica Bai", "Shai Bernstein", "Abhishek Dev", "Josh Lerner"], "year": 2021, "venue": "SSRN Electronic Journal", "url": "https://doi.org/10.2139/ssrn.3838511", "abstract": null, "cited_by": 12, "concepts": ["Globe", "Venture capital", "Developing country", "Private sector", "Government (linguistics)", "Business", "Download", "Corporate governance", "Finance", "Investment (military)", "Capital (architecture)", "Economic growth", "Economics", "Political science", "Medicine", "Politics", "Operating system", "Law", "Archaeology", "Ophthalmology", "Computer science", "History", "Philosophy", "Linguistics"], "relevance": 100, "reason": "키워드 3개 일치 (Venture Capital, Entrepreneurial Finance, Corporate G d social identity on funding choice", "doi": "10.1007/s11187-020-00337-9", "authors": ["Magnus Schückes", "Tobias Gutmann"], "year": 2020, "venue": "Small Business Economics", "url": "https://doi.org/10.1007/s11187-020-00337-9", "abstract": "Abstract Initial coin offerings (ICOs) are a novel form of funding that has driven billions of dollars into the blockchain ecosystem, potentially challenging traditional funding vehicles such as business angel or venture capital investments. However, little is known of entrepreneurs’ rationales for leveraging this emerging form of financing. This article investigates the economic and behavioral factors that motivate entrepreneurs to fund their startup operations with ICOs. By conducting in-depth interviews with C-level managers or founders of ICO-funded startups, our analysis reveals four dimensions that have an impact on the decision: (1) funding, (2) community building, (3) tokenomics, and (4) personal and ideological drivers. Our findings suggest that the entrepreneur’s social identity in conjunction with the enabling mechanisms of the blockchain technology shape entrepreneurial pursuits and funding choice. We contribute to the literature on entrepreneurial finance by increasing understanding of ICOs and to the literature on entrepreneurial decision making by providing qualitative insights into the influence of founder identity on key decisions in startups such as financing.", "cited_by": 97, "concepts": ["Entrepreneurship", "Venture capital", "Entrepreneurial finance", "Identity (music)", "Social capital", "Finance", "Business", "Marketing", "Social entrepreneurship", "Economics", "Public relations", "Sociology", "Political science", "Social science", "Acoustics", "Physics"], "relevance": 100, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 핵심 저널 · 인용 97", "is_canon": false, "summary": {"summary": "Our findings suggest that the entrepreneur’s social identity in conjunction with the enabling mechanisms of th ial intelligence"], "relevance": 100, "reason": "키워드 3개 일치 (Venture Capital, Entrepreneurial Finance, Machine Learning) · 인용 9", "is_canon": false, "summary": {"summary": "Abstract Digital technologies are transforming entrepreneurial finance. Near-ubiquitous access to the Internet, platformisation, and advances in cloud computing, machine learning and artificial intelligence, and blockchain are changing the sources, basis, and quantum of funding in ways that were uni…", "key_result": "", "dependent_var": "", "independent_var": "머신러닝", "method": "머신러닝", "caveats": "예측≠인과 주의"}, "_key": "doi:10.1007/978-3-030-53914-6_11", "tier": 2}, {"title": "An analysis of timing decision in venture capital staged financing: evidence from India", "doi": "10.1108/mrr-09-2019-0424", "authors": ["Satya Narayan Panda", "Arun Kumar Gopalaswamy"], "year": 2020, "venue": "Management Research Review", "url": "https://doi.org/10.1108/mrr-09-2019-0424", "abstract": "Purpose Staged financing is a prominent feature of the venture capital investment process. With staged financing, venture capitalists (VCs) may choose to either make an investment or delay it at each round. The purpose of this paper is to investigate the influence of market uncertainty, project-specific uncertainty and agency problems on these decisions. Design/methodology/approach The study uses data from Indian firms that received venture capital funding between 2000 and 2017. The duration between funding rounds is analysed using survival analysis. An accelerated failure time model is used to estimate the influence of market uncertainty, project-specific uncertainty and agency problems on the length of time between funding rounds. Findings VCs delay investment when there are high levels of uncertainty in the market; if market uncertainty increases by 1%, delay in funding increases by more than 6% (almost a month) on average. There is no statistically significant relationship found between the funding duration and project-specific uncertainty. Agency problems motivate VCs to invest sooner. An increase in agency problems results in a reduction of 55% (almost five months) in the length of time before the next funding round. Practical implications This study has useful business policy implications. It provides VCs with real option value drivers such as market uncertainty, agency problems, which influence the timing of decisions in staged investment processes. It will help to make the choice between investing and delaying at each round of financing more robust. Further, it is useful for VCs to differentiate between market uncertainty and agency problems against the backdrop of their different implications for staging decisions. Originality/value Few studies have examined staging decisions from a real options perspective in the context of a developed economy and very few from a developing economy perspective. This study increases understanding of staging decisions in the Indian context.", "cited_by": 4, "concepts": ["Venture capital", "Agency (philosophy)", "Finance", "Investment (military)", "Duration (music)", "Investment decisions", "Market timing", "Business", "Economics", "Agency cost", "Capital budgeting", "Capital market", "Actuarial science", "Initial public offering", "Behavioral economics", "Law", "Art", "Epistemology", "Corporate governance", "Politics", "Literature", "Shareholder", "Philosophy", "Project appraisal", "Political science"], "relevance": 100, "reason": "키워드 3개 일치 (Venture Capital, Corporate Governance, Staged Financing) · 인용 4", "is_canon": false, "summary": {"summary": "Purpose Staged financing is a prominent feature of the venture capital investment process. With staged financing, venture capitalists (VCs) may choose to either make an investment or delay it at each round.…", "key_result": "", "dependent_var": "단계적 투자, 생존", "independent_var": "", "method": "생존분석", "caveats": ""}, "_key": "doi:10.1108/mrr-09-2019-0424", "tier": 2}, {"title": "Initial Coin Offerings: Fin ms in a wide variety of business sectors. The contemporaneous growth in the number and size of private funding sources has resulted in a situation within which new firms can afford to run massive losses for long periods in an effort to dislodge incumbents or attempt to triumph over other lavishly funded startups. This has triggered remarkable turmoil in many formerly stable industrial sectors, as the new entrants fueled by capital investments undercut incumbents on price and service. The ultimate result is that new entrants with access to massive amounts of capital can survive losses for a sufficiently long period to displace existing firms and, thereby, transform earlier industrial ecosystems.", "cited_by": 183, "concepts": ["Entrepreneurship", "Business", "Creative destruction", "Stock market", "Stock (firearms)", "Barriers to entry", "Finance", "Venture capital", "Industrial organization", "Capital (architecture)", "Market economy", "Monetary economics", "Economics", "Commerce", "Market structure", "Engineering", "Mechanical engineering", "Horse", "Biology", "Archaeology", "Paleontology", "History"], "relevance": 100, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 핵심 저널 · 인용 183", "is_canon": false, "summary": {"summary": "This essay examines the implications of the evolving environment for the formation and financing of new firms in the United States. After the dot.com crash of 2000, there was a regime change in new firm formation and the number of firms that exited through an initial public stock offering.…", "key_result": "", "dependent_var": "exit", "independent_var": "성장", "method": "", "caveats": ""}, "_key": "doi:10.1080/13691066.2018.1517430", "tier": 1}, {"title": "The role of venture capital in the emerging entrepreneurial finance ecosystem: future threats and opportunities", "doi": "10.1080/13691066.2019.1608697", "authors": ["Stefano Bonini", "Vincenzo Capizzi"], "year": 2019, "venue": "Venture Capital", "url": "https://doi.org/10.1080/13691066.2019.1608697", "abstract": "The last decade has seen the emergence of alternative sources of early-stage finance, which are radically changing and reshaping the start-up eco-system. These include incubators, accelerators, science and technology parks, university-affiliated seed funds, corporate seed funds, business angels – including “super-angels”, angel groups, business angel networks and angel investment funds – and both equity- and debt-based crowdfunding platforms. In parallel with this development, large financial institutions that have traditionally invested in late-stage and mature companies, have increasingly diversified their investment portfolios to “get into the venture game”, in some cases, through the traditional closed-end funds model and, in other cases through direct investments and co-investments alongside the closed-end funds. This paper reviews the main features, investment policies and risk-return profiles of the institutional and informal investors operating in the very early stage of the life cycle of entrepreneurial firms. It concludes that traditional closed-end venture capital funds continue to play an important role in early stage finance because of their unique competences (e.g. screening, negotiating and monitoring) in what has become a wider and more complex financing ecosystem.", "cited_by": 159, "concepts": ["Venture capital", "Finance", "Entrepreneurial finance", "Business", "Debt", "Investment (military)", "Private equity", "Negotiation", "Global assets under management", "Institutional investor", "Equity (law)", "Seed money", "Corporate governance", "Politics", "Law", "Political science"], "relevance": 100, "reason": "키워드 3개 일치 (Venture Capital, Entrepreneurial Finance, Corporate Governance) · 핵심 저널 · 인용 159", "is_canon": false, "summary": {"summary": "The last decade has seen the emergence of alternative sources of early-stage finance, which are radically changing and reshaping the start-up eco-system. These include incubators, accelerators, science and technology parks, university-affiliated seed funds, corporate seed funds, business angels – in…", "key_result": "", "dependent_var": "", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.1080/13691066.2019.1608697", "tier": 1}, {"title": "The evolution of equity crowdfunding: Insights from co-investments of angels and the crowd", "doi": "10.1016/j.respol.2019.01.003", "authors": ["Wanxin Wang", "Ammara Mahmood", "Catarina Sismeiro", "Nir Vulkan"], "year": 2019, "venue": "Research Policy", "url": "https://doi.org/10.1016/j.respol.2019.01.003", "abstract": "Abstract Equity crowdfunding platforms are at the center of the digital transformation of early-stage venture funding. These digital platforms were originally heralded as a democratizing force in early stage finance, due to their role in facilitating the exchange between entrepreneurs and a multitude of non-professional small investors (“the crowd”). Equity crowdfunding platforms have experienced considerable growth and now attract professional investors including business angels. The presence of angels alongside the crowd on equity crowdfunding platforms has raised questions whether these digital platforms can continue to play their role in democratizing access to capital. Using data from a leading equity crowdfunding platform, we examine the interplay between the investment decisions of angels and the crowd. We find evidence of information flows in crowdfunding platforms between angels, and from angels to the crowd. We find angels play an important role in funding of large ventures, whereas the crowd not only fill the funding gaps for such large ventures but also play a pivotal role in the funding of small ones. The complementarity between angels and crowd investors seems to increase the overall efficiency in an otherwise highly asymmetric and uncertain market, confirming that digitization can indeed bring important benefits to venture investment.", "cited_b . Investment syndication involves collaboration, particularly where investors are value-added active investors, and there are potential agency problems among syndicated investors. This chapter reviews the literature on collaboration across different sources of entrepreneurial finance. In particular, it considers angel investors, crowdfunding, technology parks, and venture capital and private equity funds. The chapter identifies cases when different types of investors work well together, as well as cases where the evidence indicates collaboration has been less than fruitful. The chapter concluded by identifying avenues for future research.", "cited_by": 2, "concepts": ["Web syndication", "Venture capital", "Entrepreneurial finance", "Private equity", "Business", "Finance", "Equity (law)", "Agency (philosophy)", "Investment (military)", "Value (mathematics)", "Political science", "Computer science", "Machine learning", "Politics", "Law", "Epistemology", "Philosophy"], "relevance": 100, "reason": "키워드 3개 일치 (Venture Capital, Entrepreneurial Finance, Machine Learning) · 인용 2", "is_canon": false, "summary": {"summary": "An important topic in some areas of finance involves syndication, which refers to more than one investor in an investee firm. Investment syndication involves collaboration, particularly where investors are value-added active investors, and there are potential agency problems among syndicated investo…", "key_result": "", "dependent_var": "", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.1093/oxfordhb/9780190633899.013.32", "tier": 2}, {"title": "Initial coin offerings (ICOs) to finance new ventures", "doi": "10.1016/j.jbusvent.2018.09.007", "authors": ["Christian Fisch"], "year": 2018, "venue": "Journal of Business Venturing", "url": "https://doi.org/10.1016/j.jbusvent.2018.09.007", "abstract": null, "cited_by": 544, "concepts": ["Cryptocurrency", "Context (archaeology)", "New Ventures", "Quality (philosophy)", "Entrepreneurial finance", "Business", "Security token", "Value (mathematics)", "Capital (architecture)", "Information asymmetry", "Finance", "Industrial organization", "Venture capital", "Economics", "Entrepreneurship", "Computer science", "History", "Computer security", "Machine learning", "Archaeology", "Biology", "Philosophy", "Epistemology", "Paleontology"], "relevance": 100, "reason": "키워드 3개 일치 (Venture Capital, Entrepreneurial Finance, Machine Learning) · 핵심 저널 · 인용 544", "is_canon": false, "summary": {"summary": "(초록 없음 — DOI 링크에서 확인)", "key_result": "", "dependent_var": "", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.1016/j.jbusvent.2018.09.007", "tier": 1}, {"title": "The evolution and adoption of equity crowdfunding: entrepreneur and investor entry into a new market", "doi": "10.1007/s11187-018-0009-5", "authors": ["Saul Estrin", "Daniel Gozman", "Susanna Khavul"], "year": 2018, "venue": "Small Business Economics", "url": "https://doi.org/10.1007/s11187-018-0009-5", "abstract": "Equity crowdfunding (ECF) offers entrepreneurs an online social media marketplace where they can access numerous potential investors who, in exchange for an ownership stake, may supply them with finance. In this paper, we describe the evolution of this market in the UK. Using an inductive qualitative longitudinal research design, we analyse the emerging views of entrepreneurs and investors towards ECF. Our interviewees include large and small-scale investors, as well as market participants who have chosen not to invest or raise funds via ECF. We find that the large financial flows to entrepreneurs in the UK via the ECF platforms, nearly half a billion GBP since 2011, have probably been largely incremental to traditional sources of early stage entrepreneurial finance. Moreover, our research indicates that for the most part, investors appear to understand and appropriately evaluate the risks that they are bearing; ECF investments are perceived as a high risk, high return compone he social context of entrepreneurship in organizational sectors. Prior research suggests that firm foundings are driven by collective patterns of activity—such as patterns of prior foundings in a given sector. Building on research on social salience and signals, we consider the influence of singular sector‐level triggers, which we call entrepreneurial beacons. We argue that the actions or outcomes of single, salient organizations attract and motivate entrepreneurs, thus increasing the rate of foundings. We test this logic by examining the impact of the Y ale U niversity endowment's investment choices and of venture‐capital‐backed IPO run‐ups on venture‐capital foundings between 1984 and 2011. We find support for the existence and influence of beacons and outline boundary conditions for their effects . Managerial summary : What leads entrepreneurs to found new companies in nascent sectors? In contrast to prior research, which emphasizes patterns of activity, we argue that entrepreneurial activity can sometimes be driven by the actions of a singular trigger—what we call an entrepreneurial beacon. We examine the influence of two such beacons, Y ale U niversity's endowment investments and exceptional venture‐capital‐backed IPO run‐ups, on the founding of new venture‐capital firms over a 28‐year period. We find that Y ale's increased allocations to the venture‐capital asset‐class has a significant influence on the founding of new venture‐capital firms, while exceptional venture‐capital‐backed IPO run‐ups only influence venture‐capital foundings under certain conditions. Overall, we offer an explanation for heretofore anecdotal accounts of certain organizations or events that appear to have an outsized influence on entrepreneurial activity . Copyright © 2016 John Wiley &amp; Sons, Ltd.", "cited_by": 40, "concepts": ["Venture capital", "Initial public offering", "Beacon", "Entrepreneurship", "Social venture capital", "Endowment", "Entrepreneurial finance", "Capital (archit ished between 2015 and 2023. Quantitative and qualitative analyses were performed on the data using IRAMUTEQ software and Bibliometrix tool, both based in the “R” programming language. Findings The study reveals significant potential for blockchain and smart contracts to disrupt traditional venture funding models by automating contract execution and reducing administrative costs. Blockchain’s secure, decentralized ledger offers advantages in peer-to-peer transactions and risk mitigation, particularly in supply chain management and international trade. However, challenges related to scalability, energy consumption and regulatory compliance were also identified. Research limitations/implications Despite the contributions, systematic review of the literature has limitations. Only articles in English, published in journals, were considered for this research, omitting, for example, conference articles and research in other languages, which may also contain relevant information. Originality/value The study contributes to the existing literature by synthesizing recent advancements in blockchain and smart contract applications within entrepreneurial finance. It highlights the transformative potential of these technologies while addressing their limitations and offering insights into future research directions. The findings provide valuable implications for academics, practitioners and policymakers interested in leveraging blockchain for financial innovation.", "cited_by": 13, "concepts": ["Blockchain", "Venture capital", "Business", "Entrepreneurial finance", "Finance", "Entrepreneurship", "Smart contract", "Computer science", "Computer security"], "relevance": 92, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 13", "is_canon": false, "summary": {"summary": "Purpose This study conducts a systematic review to analyze the impact of blockchain technology and smart contracts on digital entrepreneurial finance and venture funding. It aims to investigate how these technologies can transform business operations, offering enhanced transparency, security and eff…", "key_result": "", "dependent_var": "", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.1108/jsbed-12-2023-0584", "tier": 3}, {"title": "Entrepreneurial finance in Europe and the Russian war against Ukraine", "doi": "10.1007/s10961-024-10067-9", "authors": ["Helmut Kraemer-Eis", "Joern Block", "Antonia Botsari", "Frank Lang", "Solvej Lorenzen", "Walter Diegel"], "year": 2024, "venue": "The Journal of Technology Transfer", "url": "https://doi.org/10.1007/s10961-024-10067-9", "abstract": "Abstract Prior research has investigated how the prices of stocks and commodities as well as inflation levels have been affected by the Russian war against Ukraine. So far, however, we know little about the impacts of the war on the entrepreneurial finance sector. Prior research on the effects of unexpected exogenous crisis events on entrepreneurial finance suggests a strong negative impact on new and follow-on funding for entrepreneurial ventures. Our study regards the Russian war against Ukraine as an unexpected exogenous crisis event and explores its impact on the entrepreneurial finance sector. It goes beyond a mere sentiment and impact analysis and also explores the underlying reasons and mechanisms as well as potential response and coping strategies employed by entrepreneurial finance investors. Based on two surveys of European venture capital (VC) and private equity (PE) investors, we find that the war had a strong negative impact on the two types of investors and their respective funds. Both VC and PE investors report more risk-aversion of limited partners (LPs) and LPs leaving the market as important challenges resulting in an overall lower willingness of LPs to invest. This applies in particular to banks, insurance funds, and pension funds. On the portfolio firm level, securing equity financing and maintaining liquidity were considered pressing issues. Overall, the situation seems to be more difficult for portfolio companies of VC as compared to PE investors. For the former, the financing- and liquidity-related issues seem to be more existential and survival-threatening. Responding to these challenges, both VC and PE investors altered their industry focus and put more emphasis on entrepreneurial experience. Financial investment selection criteria such as financial valuation, profitability, and cash- as well as revenue-generating capacity also increased in importance. Again, differences between VC and PE investors exist. Our study has implications for entrepreneurial finance theory and practice and concludes with an agenda for research on the impacts of the Russian war against Ukraine on entrepreneurial finance.", "cited_by": 9, "concepts": ["Financial system", "Political science", "Business"], "relevance": 92, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 9", "is_canon": false, "summary": {"summary": "Based on two surveys of European venture capital (VC) and private equity (PE) investors, we find that the war had a strong negative impact on the two types of investors and their respective funds.", "key_result": "Based on two surveys of European venture capital (VC) and private equity (PE) investors, we find that the war had a strong negative impact on the two types of investors and their respective funds.", "dependent_var": "후속투자, 기업가치, 생존", "independent_var": "", "method": "", "caveats": "자기응답·표본 편의 가능"}, "_key": "doi:10.1007/s10961-024-10067-9", "tier": 3}, {"title": "Inclusive digital finance: the industry of equity crowdfunding", "doi": "10.1007/s10961-021-09875-0", "authors": ["Vincenzo Butticè", "Silvio Vismara"], "year": 2021, "venue": "The Journal of Technology Transfer", "url": "https://doi.org/10.1007/s10961-021-09875-0", "abstract": "Abstract Nowadays equity crowdfunding plays an important role in the entrepreneurial finance markets. To better understand the functioning of the y experienced entrepreneurs to secure venture capital (VC) funding. Design/methodology/approach Using a qualitative approach, we conducted interviews with 32 accomplished founders with track records in securing VC funding. Our conceptual underpinning rests upon an existing negotiation competency model. This study employed a systematic and iterative data analysis method, following an inductive approach grounded in Gioia et al .’s (2013) methodology to conceptualize the unprocessed interview data. Findings We identified three dimensions characterizing entrepreneurial negotiation behavior in VC negotiations: negotiation competencies, power tactics, and negotiation style. Furthermore, we identified specific behaviors in these dimensions and explored how entrepreneurs apply these skills in the VC context. Research limitations/implications This study contributes a nuanced understanding of entrepreneurs’ negotiation behaviors, opening avenues for further research on effective strategies in entrepreneurial finance. Practical implications Entrepreneurs can leverage the identified negotiation strategies to enhance their skills and navigate VC negotiations more effectively, potentially leading to better funding outcomes. Furthermore, training programs can be crafted to encourage the cultivation of these behaviors. Originality/value This study is the first to systematically examine the negotiation behaviors and strategies employed by experienced entrepreneurs in VC negotiations, revealing entrepreneurs’ specific behaviors and elucidating how these behaviors are employed within negotiations to provide practical insights.", "cited_by": 6, "concepts": ["Negotiation", "Venture capital", "Social venture capital", "Business", "Start up", "Female entrepreneurs", "Entrepreneurship", "Business administration", "Political science", "Finance", "Law"], "relevance": 91, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 6", "is_canon": false, "summary": {"summary": "Purpose This study explores the negotiation behaviors and strategies employed by experienced entrepreneurs to secure venture capital (VC) funding. Design/methodology/approach Using a qualitative approach, we conducted interviews with 32 accomplished founders with track records in securing VC funding…", "key_result": "", "dependent_var": "", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.1108/ijebr-06-2024-0615", "tier": 3}, {"title": "Priors, Experiments, Learning and Persuasion in (Bayesian) Entrepreneurial Finance", "doi": "10.2139/ssrn.5004860", "authors": ["Ramana Nanda"], "year": 2024, "venue": "SSRN Electronic Journal", "url": "https://doi.org/10.2139/ssrn.5004860", "abstract": "At the heart of entrepreneurial finance lies a persuasion challenge: regardless of the strength of an entrepreneurâ€™s belief in the potential of their idea, they typically need to convince investors to provide the financial capital required for its commercialization. How should entrepreneurs approach this challenge in order to maximize the chance of raising the required external finance? Why does it appear harder to persuade venture capital investors to finance startups in certain industries and regions and in certain periods of time? Are there systematic frictions preventing entrepreneurs from effectively persuading investors in certain settings and if so, what can be done to reduce them? In this chapter, I discuss answers to these and other questions through a conceptual framework in which investors update their beliefs about a startupâ€™s prospects through a sequence of investments over time.", "cited_by": 5, "concepts": ["Prior probability", "Persuasion", "Bayesian probability", "Bayesian inference", "Econometrics", "Economics", "Psychology", "Computer science", "Artificial intelligence", "Social psychology"], "relevance": 91, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 5", "is_canon": false, "summary": {"summary": "At the heart of entrepreneurial finance lies a persuasion challenge: regardless of the strength of an entrepreneurâ€™s belief in the potential of their idea, they typically need to convince investors to provide the financial capital required for its commercialization. How should entrepreneurs approa…", "key_result": "", "dependent_var": "", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.2139/ssrn.5004860", "tier": 3}, {"title": "Emotions and entrepreneurial finance: Analysis of venture capitalists’ and business angels’ digital footprints on Twitter", "doi": "10.1007/s11365-024-01018-9", "authors": ["Manuel Kaiser", "Andreas Kuckertz"], "year": 2024, "venue": "International Entrepreneurship and Management Journal", "url": "https://doi.org/10.1007/s11365-024-01018-9", "abstract": "Abstract Emotions are a central concept in previous entrepreneurship research, but this is mainly related to entrepreneurs and their entrepreneurial journey. However, venture capitalists (VCs) and business angels (BAs), two critical investors in the entrepreneurial finance literature, are essential actors in the entrepreneurial process. Still, little is known about investor emotions in this context. Therefore, in this study, we ask how venture capitalists differ from business angels in terms of their expressed emotions. To this end, we use an increasingly familiar research approach by examining the digital footprints of these investors on Twitter. For this purpose, we identify 822 investors from Crunchbase and analyze their 994,969 Tweets with Linguistic Inquiry and Word Count (LIWC) as a text analysis tool. Our results show that venture capitalists display more positive emotions on Twitter than angel investors, meaning that we find an association between VCs and emotional tone. Furthermore, in our post-hoc analysis, we explore further explanations for the differences between VC and BA. In doing so, we show differences in their expressed cognitive processes as well as in their communicated drivers. In both concepts, we find positive associations with the investor type of VC. To conclude this paper, we develop implications for practice and further research based on the results.", "cited_by": 5, "concepts": ["Venture capital", "Entrepreneurship", "Entrepreneurial finance", "Business", "Social venture capital", "Finance", "Business administration"], "relevance": 91, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 5", "is_canon": false, "summary": {"summary": "Our results show that venture capitalists display more positive emotions on Twitter than angel investors, meaning that we find an association between VCs and emotional tone.", "key_result": "Our results show that venture capitalists display more positive emotions on Twitter than angel investors, meaning that we find an association between VCs and emotional tone.", "dependent_var": "", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.1007/s11365-024-01018-9", "tier": 3}, {"title": "Entrepreneurial Finance", "doi": "10.1007/978-3-031-19554-9_15", "authors": ["Anne Lafarre", "Ivona Schoonbrood"], "year": 2023, "venue": "Classroom companion: business", "url": "https://doi.org/10.1007/978-3-031-19554-9_15", "abstract": null, "cited_by": 5, "concepts": ["Initial public offering", "Finance", "Venture capital", "Incentive", "Business", "Agency (philosophy)", "Investment (military)", "Economics", "Market economy", "Philosophy", "Politics", "Political science", "Epistemology", "Law"], "relevance": 91, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 5", "is_canon": false, "summary": {"summary": "(초록 없음 — DOI 링크에서 확인)", "key_result": "", "dependent_var": "", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.1007/978-3-031-19554-9_15", "tier": 3}, {"title": "Does Investor Gender Matter for the Success of Female Entrepreneurs? Gender Homophily and the Stigma of Incompetence in Entrepreneurial Finance", "doi": "10.1287/orsc.2022.1594", "
