ther than diverting funds toward lower-quality startups.", "dependent_var": "IPO", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.1017/s0022109025102354", "tier": 3}, {"title": "Entrepreneurial Finance Strategies for Startup Success", "doi": "10.60079/aefs.v2i2.283", "authors": ["Yana Ermawati"], "year": 2024, "venue": "Advances in Economics & Financial Studies", "url": "https://doi.org/10.60079/aefs.v2i2.283", "abstract": "This study explores entrepreneurial finance strategies crucial for startup success. The purpose is to analyze venture capital dynamics, bootstrapping, crowdfunding mechanisms, and financial planning. Research design involves a literature review synthesizing findings from scholarly articles. Findings indicate that VC funding offers capital and expertise but is competitive, while bootstrapping provides autonomy and encourages resourcefulness. Crowdfunding offers alternative financing but requires effective marketing and community engagement. Financial planning fosters sustainable growth through prudent resource management. Discussion underscores the significance of understanding financing options and their implications. Entrepreneurs must weigh trade-offs, investors acknowledge diverse financing mechanisms, and policymakers foster supportive environments. Implications extend to economic growth and innovation. By adopting suitable financing strategies, startups enhance their chances of success, contributing to vibrant entrepreneurial ecosystems.", "cited_by": 4, "concepts": ["Entrepreneurial finance", "Business", "Finance", "Venture capital"], "relevance": 90, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 4", "is_canon": false, "summary": {"summary": "This study explores entrepreneurial finance strategies crucial for startup success. The purpose is to analyze venture capital dynamics, bootstrapping, crowdfunding mechanisms, and financial planning.…", "key_result": "", "dependent_var": "", "independent_var": "성장", "method": "", "caveats": ""}, "_key": "doi:10.60079/aefs.v2i2.283", "tier": 3}, {"title": "Has persistence persisted in private equity? Evidence from buyout and venture capital funds", "doi": "10.1016/j.jcorpfin.2023.102361", "authors": ["Robert S. Harris", "Tim Jenkinson", "Steven N. Kaplan", "Ruediger Stucke"], "year": 2023, "venue": "Journal of Corporate Finance", "url": "https://doi.org/10.1016/j.jcorpfin.2023.102361", "abstract": "This paper presents new evidence on performance persistence for U.S. private equity (buyout and venture capital) funds. We use high quality cash-flow data from Burgiss's large sample of institutional investors (as of December 2020) which allows us to examine how persistence has changed over more than three decades of fundraising. Venture capital (VC) performance remains remarkably persistent across funds raised by the same general partner (GP). In contrast, buyout funds' performance persistence becomes noticeably weaker over time. The patterns are different when we restrict the analysis to information that would have been available to investors – interim performance on the previous fund at the time a new fund is raised – rather than using final, or latest, performance. We find little evidence of persistence for buyouts, especially post-2000. We continue to find persistence for VC funds though it declines post-2000. The differences are driven by interim performance reported at the time of fundraising being only moderately correlated to final performance and GPs avoiding fundraising when interim performance is poor. Finally, we look at GPs who introduce new fund styles and find that performance is noticeably lower for buyouts (but not VC). Exploring the reasons for these divergent trends in persistence between buyout and VC is a promising area for future research.", "cited_by": 77, "concepts": ["Venture capital", "Interim", "Private equity", "Leveraged buyout", "Business", "Persistence (discontinuity)", "Finance", "Equity (law)", "Private equity firm", "Institutional investor", "Limited partnership", "Cash flow", "Private equity fund", "Monetary economics", "Economics", "Corporate governance", "General partnership", "Geotechnical engineering", "Political science", "Engineering", "Archaeology", "History", "Law"], "relevance": 90, "reason": "키워드 2개 일치 (Venture Capital, Corporate Governance) · 핵심 저널 · 인용 77", "is_canon": false, "summary": {"summary": "We find little evidence of persistence for buyouts, especially post-2000.", "key_result": "We find little evidence of persistence for buyouts, especially post-2000.", "dependent_var": "펀드레이징", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.1016/j.jcorpfin.2023.102361", "tier": 3}, {"title": "The Economics of Startup Business Finance: An Investigation through the Lens of Financial Growth Cycle Theory", "doi": "10.59091/1410-8046.2071", "authors": ["Yesubabu Konga", "R. Kasilingam"], "year": 2023, "venue": "Bulletin of Monetary Economics and Banking", "url": "https://doi.org/10.59091/1410-8046.2071", "abstract": "The provision of finance is the key to the survival and success of new firms. The current paper examines the startup firms' finance acquisition through the viewpoint of financial growth cycle theory. We used chi-square and Mann-Whitney U tests to examine our hypotheses. Our study uses data for 386 Indian startup entrepreneurs over the period 2019 – 2021. Our results show that the startups access angel finance significantly in the initial years and the venture capital, banks and NBFCs in their later stage of life.", "cited_by": 4, "concepts": ["Venture capital", "Finance", "Business cycle", "Life-cycle hypothesis", "Entrepreneurial finance", "Economics", "Start up", "Business", "Business administration", "Macroeconomics"], "relevance": 90, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 4", "is_canon": false, "summary": {"summary": "Our results show that the startups access angel finance significantly in the initial years and the venture capital, banks and NBFCs in their later stage of life.", "key_result": "Our results show that the startups access angel finance significantly in the initial years and the venture capital, banks and NBFCs in their later stage of life.", "dependent_var": "생존, M&A", "independent_var": "성장", "method": "", "caveats": ""}, "_key": "doi:10.59091/1410-8046.2071", "tier": 3}, {"title": "Systematic Literature Review of Sustainable Finance: Implications for Entrepreneurial Finance through Venture Capitals (VC)", "doi": "10.28934/ea.23.56.2.pp68-83", "authors": ["Rosa Mehrabi"], "year": 2023, "venue": "Economic Analysis", "url": "https://doi.org/10.28934/ea.23.56.2.pp68-83", "abstract": "The idea of sustainable development as a whole gave rise to the concept of sustainable finance in recent decades. It illustrates how financial markets address the current and upcoming economic, social, and environmental issues. This study reviews the literature on sustainable finance and how it relates to venture capital and entrepreneurial finance research topics. As part of the research process, a Systematic and methodical assessment and analysis of the literature was carried out. The results present comprehensive summaries of the main themes and frameworks, as well as the opportunities, challenges, strengths, and weaknesses of the fields. It also highlights the interaction between sustainable finance and venture capital in supporting innovation and sustainability in entrepreneurship. The main paper's contribution is to identify sustainable finance as a process that operates at multiple levels. It indicates that a shift in the financial paradigm from profit maximization to sustainability facilitation is required to attain sustainable development at the level of private financial markets and sustainable entrepreneurship. According to the findings, venture capital funds are major participants in the private financial sector, supporting entrepreneurial startups and playing a key role in sustainable finance by promoting a culture of innovation, resource efficiency, and sustainability among entrepreneurial ventures. The paper cites critical review as the source of these arguments. Finally, through applying this comprehensive critical analysis, several gaps in the existing literature have been identified and discussed.&#x0D;", "cited_by": 3, "concepts": ["Venture capital", "Sustainability", "Finance", "Entrepreneurship", "Business", "Sustainable development", "Financial innovation", "Financial capital", "Economics", "Profit (economics)", "Political science", "Microeconomics", "Biology", "Law", "Ecology"], "relevance": 90, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 3", "is_canon": false, "summary": {"summary": "The idea of sustainable development as a whole gave rise to the concept of sustainable finance in recent decades. It illustrates how financial markets address the current and upcoming economic, social, and environmental issues.…", "key_result": "", "dependent_var": "", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.28934/ea.23.56.2.pp68-83", "tier": 3}, {"title": "The Role of Entrepreneurial Finance in Corporate Social Responsibility and New Venture Performance in an Emerging Market", "doi": "10.1177/09713557211025655", "authors": ["Muhammad Sualeh Khattak", "Muhammad Anwar", "Thomas Clauß"], "year": 2021, "venue": "The Journal of Entrepreneurship", "url": "https://doi.org/10.1177/09713557211025655", "abstract": "Corporate social responsibility (CSR) has over the past decades transformed from a philanthropic attribute to something compulsory. It has become the imperative duty of organisations, irrespective of their size, nature of business and age. However, because of poor financial capabilities and lack of support, newly established ventures too often fail to voluntarily participate in social and environmental activities. This is one reason why national governments have initiated various programs and policies to encourage CSR and environmental activities in new ventures. However, previous studies have yet to fully reveal the effects of entrepreneurial finance on CSR and the environmental, financial and innovative performance of newly established ventures. To fill this gap, we used a survey to gather empirical evidence from 255 newly established ventures. The results indicate that entrepreneurial finance directly contributes to financial performance, while indirectly contributing to environmental and innovative performance through CSR. Our research recommends that new ventures efficiently utilise entrepreneurial finance to configure CSR activities that achieve high profitability, and environmental and innovative performance. Moreover, our research encourages governments to make financial loans to ventures engaged in social and environmental activities to help them reach their sustainable development goals.", "cited_by": 34, "concepts": ["Corporate social responsibility", "Business", "Profitability index", "Finance", "New Ventures", "Empirical research", "Venture capital", "Social responsibility", "Entrepreneurship", "Accounting", "Marketing", "Public relations", "Epistemology", "Political science", "Philosophy"], "relevance": 90, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 34", "is_canon": false, "summary": {"summary": "The results indicate that entrepreneurial finance directly contributes to financial performance, while indirectly contributing to environmental and innovative performance through CSR.", "key_result": "The results indicate that entrepreneurial finance directly contributes to financial performance, while indirectly contributing to environmental and innovative performance through CSR.", "dependent_var": "", "independent_var": "", "method": "", "caveats": "자기응답·표본 편의 가능"}, "_key": "doi:10.1177/09713557211025655", "tier": 3}, {"title": "Sources of finance for tech startups over its lifecycle: what determines their approach of sources and its success?", "doi": "10.1108/ijoem-06-2020-0705", "authors": ["Shivalik Singh", "Bala Subrahmanya Mungila Hillemane"], "year": 2021, "venue": "International Journal of Emerging Markets", "url": "https://doi.org/10.1108/ijoem-06-2020-0705", "abstract": "Purpose The purpose of this paper is to ascertain the factors determining the choice of sources of finance for a tech startup over its lifecycle. Design/methodology/approach This study adopts simple random sampling technique to choose 93 sample tech startups in Bangalore. Further, this study employs the primary data collection from the sampled startups under study through a semi-structured questionnaire and in-depth interviews with the founders/CEOs of these startups. Furthermore, it carries out binary logistic regression analysis to primarily examine the likelihood of a tech startup to approach and access a particular source of finance over its lifecycle. Findings Our results indicate that a tech startup's choice for a financial source varies with its lifecycle stage and financial requirements. We find that while in its early stage, a tech startup's choice of a financial source is limited to business angels (BA), in the growth stage, it approaches the institutional sources, viz. Venture Capital (VC), Corporate Venture Capital (CVC), Banks and Private Equity (PE) firms alternatively. Out of the three major categories of financial requirements: Human Capital (HC), Research Capital (RC) and Social Capital (SC), the requirement for HC and SC is predominantly funded by VCs, while the acquisition of RC is facilitated by early stage investors (BAs) as well as growth stage investors (CVC and PEs). Research limitations/implications The research implication of the study lies in bringing out the need to understand both the nature and the quantum of financial requirements of tech startups would influence the sources of finance it would approach and obtain finance for its operations and growth. Practical implications The major policy implication of the study refers to the need to promote the diverse sources of finance to meet the diverse needs of finance in different stages of a tech startup's lifecycle. Particularly in an emerging economy, where we do not see the emergence and growth of highly innovative tech startups, the need to promote adequate availability of RC is especially important. Originality/value This study makes a key contribution to the entrepreneurial finance literature by empirically investigating the factors determining a tech startup's propensity to approach and access a particular source of finance over its lifecycle.", "cited_by": 31, "concepts": ["Venture capital", "Finance", "Business", "Private equity", "High tech", "Law", "Political science"], "relevance": 90, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 31", "is_canon": false, "summary": {"summary": "Findings Our results indicate that a tech startup's choice for a financial source varies with its lifecycle stage and financial requirements.", "key_result": "Findings Our results indicate that a tech startup's choice for a financial source varies with its lifecycle stage and financial requirements.", "dependent_var": "M&A", "independent_var": "성장", "method": "회귀분석", "caveats": "자기응답·표본 편의 가능"}, "_key": "doi:10.1108/ijoem-06-2020-0705", "tier": 3}, {"title": "Digital start-up access to venture capital financing: What signals quality?", "doi": "10.1016/j.ememar.2020.100743", "authors": ["Nirjhar Nigam", "Cristiane Benetti", "Sofia A. Johan"], "year": 2020, "venue": "Emerging Markets Review", "url": "https://doi.org/10.1016/j.ememar.2020.100743", "abstract": "Abstract What signals quality for digital startups seeking access to external finance? Analyzing a unique dataset from India, we investigate the impact of traditional quality signals (e.g., the founders’ years of experience, prior industry experience); networking signals (e.g., degrees from elite educational institutes, the breadth of an entrepreneurial team); and digital signals (e.g., the social media presence of the startup on multiple social media sites) on the access to venture capital financing. We find that while networking and digital signals positively impact access to financing, traditional human capital signals do not have any significant impact on the process.", "cited_by": 54, "concepts": ["Venture capital", "Business", "Quality (philosophy)", "Social media", "Finance", "Social capital", "Seed money", "Entrepreneurial finance", "Entrepreneurship", "Computer science", "Sociology", "Philosophy", "Epistemology", "Social science", "World Wide Web"], "relevance": 90, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 54", "is_canon": false, "summary": {"summary": "We find that while networking and digital signals positively impact access to financing, traditional human capital signals do not have any significant impact on the process.", "key_result": "We find that while networking and digital signals positively impact access to financing, traditional human capital signals do not have any significant impact on the process.", "dependent_var": "", "independent_var": "신호", "method": "", "caveats": ""}, "_key": "doi:10.1016/j.ememar.2020.100743", "tier": 3}, {"title": "The internationalization of African fintech firms: marketing strategies for successful intra-Africa expansion", "doi": "10.1108/imr-05-2019-0130", "authors": ["Zara Hammerschlag", "Geoff Bick", "John M. Luiz"], "year": 2020, "venue": "International Marketing Review", "url": "https://doi.org/10.1108/imr-05-2019-0130", "abstract": "Purpose The purpose of this study is to explore how African fintech firms adapt their marketing strategies for successful market expansion into new African countries. Design/methodology/approach This exploratory study is qualitative in nature and utilizes semi-structured interviews at 14 African fintech firms. Findings The study reveals that, during intra-Africa expansion, firms adapt their marketing strategies by working with local people, prioritizing customer education, creating personal relationships with customers, adapting their communication strategies and pricing strategies and using social media. The strategies that have been most effective involve including the community in the marketing process, prioritizing relationships, segmenting customers geographically, educating customers about products, using local distribution partners and having a flexible approach to strategy adaptation. Practical implications It has been argued that technological innovation in Africa in areas such as financial services is a critical driver of its future development, because of the opportunity it presents to promote financial inclusion. Through an increase in venture capital investment on the continent, technological innovations in financial services have grown exponentially, and this study contributes to the understanding of the marketing strategies employed to gain market traction. Originality/value This study proposes that African fintech firms adopt a bottom-up, value proposition-driven marketing strategy to successfully navigate the environment. The proposed framework provides a lens through which to understand the components of successful strategy adaptation in Africa, against the backdrop of the unique market challenges inherent in this emerging market continent.", "cited_by": 52, "concepts": ["Marketing", "Marketing strategy", "Business", "Value proposition", "Internationalization", "Target market", "Digital marketing", "Originality", "Return on marketing investment", "Emerging markets", "Qualitative research", "Sociology", "Finance", "International trade", "Social science"], "relevance": 90, "reason": "키워드 2개 일치 (Venture Capital, market traction) · 인용 52", "is_canon": false, "summary": {"summary": "Purpose The purpose of this study is to explore how African fintech firms adapt their marketing strategies for successful market expansion into new African countries. Design/methodology/approach This exploratory study is qualitative in nature and utilizes semi-structured interviews at 14 African fin…", "key_result": "", "dependent_var": "", "independent_var": "market traction", "method": "", "caveats": ""}, "_key": "doi:10.1108/imr-05-2019-0130", "tier": 3}, {"title": "Entrepreneurial finance and new venture success ‐ the moderating role of government support", "doi": "10.1002/bsd2.105", "authors": ["Muhammad Anwar", "Kayhan Tajeddini", "Rizwan Ullah"], "year": 2020, "venue": "Business Strategy & Development", "url": "https://doi.org/10.1002/bsd2.105", "abstract": "Abstract The high failure ratio in newly born ventures across the globe has been raised a challenging question. Numerous strategies have been introduced to enhance the survival of new ventures in the long run, but the results are fragmented. The research model examined the influence of entrepreneurial finance on new venture success. The model also considered a moderating role of government support while predicting ventures success. This area is under‐researched particularly in the context of Pakistan; therefore, this research may contribute to the existing body of knowledge to appraise the industry in Pakistan. Data were collected from 182 new ventures operating in an emerging economy in Pakistan and analyzed by SmartPLS. The results indicate that entrepreneurial finance and government support have a significant influence on new venture success. Moderation analysis demonstrates that government support strengthens the relationship between entrepreneurial finance and new venture success. The findings suggest implications for policymakers to initiate effective policies and programs for newly started ventures regarding financial and nonfinancial support; in this backdrop, the incubation services are important.", "cited_by": 47, "concepts": ["New Ventures", "Moderation", "Government (linguistics)", "Globe", "Business", "Context (archaeology)", "Entrepreneurial finance", "Entrepreneurship", "Marketing", "Venture capital", "Finance", "Business administration", "Psychology", "Social psychology", "Philosophy", "Biology", "Paleontology", "Ophthalmology", "Medicine", "Linguistics"], "relevance": 90, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 47", "is_canon": false, "summary": {"summary": "The results indicate that entrepreneurial finance and government support have a significant influence on new venture success.", "key_result": "The results indicate that entrepreneurial finance and government support have a significant influence on new venture success.", "dependent_var": "생존", "independent_var": "", "method": "", "caveats": "예측≠인과 주의"}, "_key": "doi:10.1002/bsd2.105", "tier": 3}, {"title": "New Venture Creation Entrepreneurship for the 21st Century", "doi": null, "authors": ["Stephen Spinelli", "Robert Adams"], "year": 2014, "venue": "Medical Entomology and Zoology", "url": "https://openalex.org/W1577898010", "abstract": "Part I The Opportunity Chapter 1. The Entrepreneurial Revolution Chapter 2. The Entrepreneurial Process Chapter 3. The Opportunity: Creating, Shaping, Recognizing, and Seizing Chapter 4. Screening Venture Opportunities Chapter 5. Entrepreneurs and the Continuing Internet Revolution: The Expanding Frontier Chapter 6. Entrepreneurial Opportunities: The Franchise Alternative Part II The Founders Chapter 7. The Entrepreneurial Mind in Thought and Action Chapter 8. The Entrepreneurial Manager Chapter 9. The New Venture Team Chapter 10. Personal Ethics and the Entrepreneur Part III Resource Requirements Chapter 11. Resource Requirements Chapter 12. The Business Plan Part IV Financing Entrepreneurial Ventures Chapter 13. Entrepreneurial Finance Chapter 14. Obtaining Venture and Growth Capital Chapter 15. The Deal: Valuations, Structure and Negotiation Chapter 16. Obtaining Debt Capital Part V Startup and After Chapter 17. Managing Rapid Growth Chapter 18. The Entrepreneur and the Troubled Company Chapter 19. The Harvest and Beyond Crafting a Personal Entrepreneurial Strategy", "cited_by": 2067, "concepts": ["Venture capital", "Entrepreneurship", "Negotiation", "Entrepreneurial finance", "Resource (disambiguation)", "Business plan", "Business", "Management", "Political science", "Economics", "Marketing", "Finance", "Computer network", "Computer science", "Law"], "relevance": 90, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 2067", "is_canon": false, "summary": {"summary": "Part I The Opportunity Chapter 1. The Entrepreneurial Revolution Chapter 2.…", "key_result": "", "dependent_var": "기업가치", "independent_var": "성장", "method": "", "caveats": ""}, "_key": "title:newventurecreationentrepreneurshipforthe21stcentury", "tier": 3}, {"title": "Interplay of Human and Structural Capital Signals for New Technology Ventures in Early-Stage Venture Capital Funding", "doi": "10.37725/mgmt.2026.10762", "authors": ["Arnauld Bessagnet"], "year": 2026, "venue": "M n gement", "url": "https://doi.org/10.37725/mgmt.2026.10762", "abstract": "By drawing on the socio-cognitive perspective of signalling theory, this study examines how the interplay of human and structural capital signals may be associated with early-stage venture capital (VC) funding for new technology ventures. Using a dataset of 453 French new technology ventures operating in the digital industry, the findings reveal that strong signals such as patents or trademarks enhance firm legitimacy, while weaker signals such as education level or degrees from elite institutions reinforce team credibility. Both types of signals are positively correlated with early-stage VC funding. However, the results indicate that combining signals of the same dimension and strength yields diminishing returns because additional within-dimension signals are informationally redundant, add little new information about legitimacy or credibility, and lower the likelihood of funding. In noisy, information-saturated contexts, overlapping signals create redundancy and investor cognitive overload rather than facilitating decision-making. This study advances signalling theory by framing signal interactions as a strategic portfolio choice, and outlines implications for entrepreneurial research, investor decision-making, and future work on signalling strategies.", "cited_by": 1, "concepts": ["Venture capital", "Signalling", "Human capital", "Portfolio", "Business", "New Ventures", "Industrial organization", "Economics", "Information asymmetry", "Framing (construction)", "Entrepreneurship", "Corporate venture capital", "Information technology", "High tech", "Perspective (graphical)", "Legitimacy", "Entrepreneurial finance", "Multidimensional scaling", "Earnings", "Work (physics)", "Finance", "Signaling game", "Dimension (graph theory)", "Marketing", "Emerging technologies", "Capital market", "Capital structure", "Capital (architecture)"], "relevance": 89, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 1", "is_canon": false, "summary": {"summary": "However, the results indicate that combining signals of the same dimension and strength yields diminishing returns because additional within-dimension signals are informationally redundant, add little new information about legitimacy or credibility, and lower the likelihood of funding.", "key_result": "However, the results indicate that combining signals of the same dimension and strength yields diminishing returns because additional within-dimension signals are informationally redundant, add little new information about legitimacy or credibility, and lower the likelihood of funding.", "dependent_var": "", "independent_var": "신호", "method": "", "caveats": ""}, "_key": "doi:10.37725/mgmt.2026.10762", "tier": 3}, {"title": "HYPERSCALING HOUSING: Venture Capital, Real Estate Start‐Ups and the Race to Build a Global Residential Brand", "doi": "10.1111/1468-2427.70046", "authors": ["Tim White"], "year": 2026, "venue": "International Journal of Urban and Regional Research", "url": "https://doi.org/10.1111/1468-2427.70046", "abstract": "Abstract What happens when venture capitalists try to reinvent housing in their own image? Synonymous with the rise of Big Tech, venture capitalists (VCs) are asset managers that invest in early‐stage companies, pursuing aggressive growth and market domination. Since the 2008 financial crisis, VCs have poured huge sums into real estate start‐ups. Yet these actors are largely overlooked in the housing financialization and platform real estate literature. Attending to this gap, this article traces VC‐fuelled attempts to build a globally scaled residential operator. It closely follows investment, acquisition and consolidation activity in the co‐living sector over the past decade, where companies seek expansion via parasitic landlordism: exploiting urban rent‐gaps as intermediaries between landlords and tenants. I show how venture capitalists have pushed these start‐ups to rapidly increase the number of beds under operation and cities covered. But, faced with the complex, costly and variegated reality of housing systems, they invariably incur spiraling losses. It is tenants who pay the price, suffering emotionally and financially from the hazards of hyperscaling—from negligence to dispossession. In all, the article interrogates a key set of actors underlying the housing‐tech‐finance nexus, and the consequences of their experimentation for households and cities. It calls for closer attention to how investors are reshaping housing markets beyond asset ownership, and to who is financing ʻproptech’ and why this matters.", "cited_by": 1, "concepts": ["Real estate", "Financialization", "Finance", "Venture capital", "Business", "Asset (computer security)", "Diversification (marketing strategy)", "Intermediary", "Market economy", "Consolidation (business)", "Economics", "Corporation", "Entrepreneurial finance", "Race (biology)", "General partnership", "Real estate development", "Financial services", "Option fee", "Financial innovation", "Capital (architecture)", "Financial market", "Economy", "Private equity", "Real estate investment trust", "Commerce", "Financial intermediary", "Financial crisis"], "relevance": 89, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 1", "is_canon": false, "summary": {"summary": "Abstract What happens when venture capitalists try to reinvent housing in their own image? Synonymous with the rise of Big Tech, venture capitalists (VCs) are asset managers that invest in early‐stage companies, pursuing aggressive growth and market domination.…", "key_result": "", "dependent_var": "M&A", "independent_var": "성장", "method": "", "caveats": ""}, "_key": "doi:10.1111/1468-2427.70046", "tier": 3}, {"title": "Introduction to Entrepreneurial Finance", "doi": "10.1017/9781009537827.002", "authors": ["Luisa Alemany", "Job J. Andreoli"], "year": 2026, "venue": "Cambridge University Press eBooks", "url": "https://doi.org/10.1017/9781009537827.002", "abstract": "Rigorously revised, with brand new chapters on additional private sources of funding, due diligence, sustainable finance, and deep tech investing, the second edition of this successful textbook provides a cutting-edge, practical, and comprehensive review of the financing of entrepreneurial ventures. From sourcing and obtaining funds, to financial tools for growing and managing the financial challenges and opportunities of the startup, this engaging text will help entrepreneurs, students, and early-stage investors to make sound financial decisions at every stage of a business' life. The text is grounded in sound theoretical foundations with a strong European perspective and reference to the Middle East and Africa. New case studies and success stories, and up-to-date perspectives from experts and the media, provide real-world applications, while a wealth of activities give students abundant opportunities to apply what they have learned. A must-have text for graduate and undergraduate students in entrepreneurship, finance, and management programmes, as well as aspiring entrepreneurs and early-stage investors in any field.", "cited_by": 1, "concepts": ["Finance", "Entrepreneurial finance", "Perspective (graphical)", "Sound (geography)", "Entrepreneurship", "Business", "Economics", "Financial plan", "Private equity", "Graduate students", "Financial engineering", "Strategic financial management", "Marketing", "Financial literacy", "Venture capital", "Financial management", "Grounded theory", "Financial market", "Public relations", "Financial services"], "relevance": 89, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 1", "is_canon": false, "summary": {"summary": "Rigorously revised, with brand new chapters on additional private sources of funding, due diligence, sustainable finance, and deep tech investing, the second edition of this successful textbook provides a cutting-edge, practical, and comprehensive review of the financing of entrepreneurial ventures.…", "key_result": "", "dependent_var": "", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.1017/9781009537827.002", "tier": 3}, {"title": "Reframing the ideal investor through entrepreneurial experience", "doi": "10.1108/md-08-2024-1957", "authors": ["Isaac Haq", "Danny Soetanto"], "year": 2026, "venue": "Management Decision", "url": "https://doi.org/10.1108/md-08-2024-1957", "abstract": "Purpose This study examines how entrepreneurial experience shapes perceptions of the ideal investor in the technology-based sector. While previous research has primarily focused on how investors evaluate entrepreneurs, this study shifts the lens to explore how entrepreneurs assess investor attributes. It investigates how experience in securing funding and building ventures influences expectations around value-added contributions beyond financial investment. Specifically, the study explores whether experience leads entrepreneurs to adopt a more strategic and values-driven approach, placing greater emphasis on ethical alignment, expertise, and relational quality, while placing less importance on operational involvement and financial oversight. Design/methodology/approach This study adopts a quantitative research design using survey data from 195 entrepreneurs in the technology-based sector. Participants were recruited through entrepreneurial and investor networks across multiple countries. The survey captured key aspects of entrepreneurial experience, including fundraising and venture development, alongside expectations of investor roles and attributes. Factor analysis identified dimensions of value-added investor support, and k-means clustering was used to group entrepreneurs based on preference profiles. Multinomial logistic regression and OLS regression analyses were conducted to examine how different types of experience influence entrepreneurs' preferences for specific investor attributes and types of support. Findings The results show that entrepreneurial experience plays a significant role in shaping expectations of investor involvement. Entrepreneurs with more experience in fundraising and venture development tend to prioritize ethical conduct, strategic input, and relational alignment over traditional factors like financial returns or past performance. They value investor support focused on strategy, networks, and governance, while placing less importance on operational or financial oversight. Cross-sector experience further reinforces a preference for strategic-driven supports. Overall, the findings suggest that experience increases entrepreneurs' confidence and selectivity, encouraging a more strategic approach to building investor relationships. Research limitations/implications This study has several limitations. First, the data were collected primarily from entrepreneurs in developed countries with well-established venture capital markets, which may limit the generalization of the findings to emerging or less mature ecosystems. Second, the target population is difficult to define precisely, given the informal and decentralized nature of entrepreneurial networks. Third, the reliance on self-reported survey data introduces the possibility of response bias. Additionally, the cross-sectional design limits the ability to draw causal inferences. Future research could benefit from longitudinal data and broader geographic representation to better capture variation across different entrepreneurial contexts. Practical implications The findings provide actionable insights for both entrepreneurs and investors. As entrepreneurs gain experience, they become more selective, favouring investors who offer strategic guidance, ethical alignment, and relational support over purely financial backing. For investors, this highlights the importance of articulating non-financial value, such as expertise, governance input, and network access, to appeal to more experienced founders. Investors who position themselves as collaborative partners rather than controllers may build stronger, longer-lasting relationships. Entrepreneurial support programs, including accelerators and incubators, can also use these insights to prepare founders to identify and engage with strategically aligned investors. Social implications This study highlights the growing importance of trust, ethical conduct, and shared values in shaping effective entrepreneurial ecosystems. As entrepreneurs gain experience, they increasingly prioritize relational quality and strategic alignment in their investor relationships. This signals a broader shift toward more collaborative, purpose-driven engagement between founders and investors. Such a shift has the potential to foster healthier power dynamics, reduce misalignment and conflict, and support the formation of long-term partnerships grounded in mutual respect and shared vision. These findings contribute to ongoing discussions around responsible entrepreneurship and the sustainability of venture growth. Originality/value This study offers a novel contribution by shifting the focus from how investors assess entrepreneurs to how entrepreneurs evaluate potential investors. It addresses an under explored area in entrepreneurial finance, particularly highlighting the role of ethical behaviour and strategic alignment in investor selection. By examining how experience shapes these expectations, the study adds to the limited literature comparing novice and experienced entrepreneurs in their interactions with external stakeholders. It advances understanding of founder–investor dynamics and offers fresh insights into how entrepreneurial learning influences decision-making in the context of venture growth and funding relationships.", "cited_by": 1, "concepts": ["Marketing", "Cognitive reframing", "Multinomial logistic regression", "Entrepreneurial finance", "Perception", "Business", "Ideal (ethics)", "Entrepreneurship", "Survey data collection", "Value (mathematics)", "Economics", "Preference", "Real estate", "Ordered logit", "Finance", "Financial services", "Prospect theory", "Vignette", "New Ventures", "Originality", "Ordinary least squares", "Portfolio", "Logistic regression", "Accredited investor", "Bond", "Regression analysis"], "relevance": 89, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 1", "is_canon": false, "summary": {"summary": "Findings The results show that entrepreneurial experience plays a significant role in shaping expectations of investor involvement.", "key_result": "Findings The results show that entrepreneurial experience plays a significant role in shaping expectations of investor involvement.", "dependent_var": "펀드레이징", "independent_var": "성장, 기업지배구조, 신호", "method": "회귀분석", "caveats": "자기응답·표본 편의 가능, 자기응답 편의 가능, 횡단면: 상관≠인과"}, "_key": "doi:10.1108/md-08-2024-1957", "tier": 3}, {"title": "India’s Innovation Ecosystem: An Analysis of le of entrepreneurs’ attributes in early-stage investment decisions", "doi": "10.1177/14657503251317631", "authors": ["Adi Hoorvitch Lavi", "Eyal Yaniv"], "year": 2025, "venue": "The International Journal of Entrepreneurship and Innovation", "url": "https://doi.org/10.1177/14657503251317631", "abstract": "Access to capital is a critical step for early-stage entrepreneurial ventures such as start-ups but also constitutes a major hurdle since there is little available data to back up their product. The current paper proposes a theoretical early-stage investment decision-making framework that draws on dual process theory and signaling theory to suggest that investors’ intuition is composed of cues and signals that impact their overall perception of the entrepreneur and the venture evaluation. Four categories are shown to define the ways in which entrepreneur attributes contribute to angels’ and venture capitalists’ gut-feeling evaluations of funding potential: (1) attributes that investors look for in an entrepreneur as assessed during their early encounters, (2) pitch-related attributes that are indicative of entrepreneur motivation, (3) attributes related to venture performance that may point to the venture's growth potential and (4) entrepreneur self-efficacy. By proposing a theory of early investment decision-making based on System 1 and not only System 2 as is typically hypothesized, this framework contributes to the literature on entrepreneurial finance theory, individual decision-making, and theories of affective judgment under conditions of extreme risk and uncertainty.", "cited_by": 1, "concepts": ["Business", "Investment (military)", "Investment decisions", "Finance", "Entrepreneurship", "Industrial organization", "Stage (stratigraphy)", "Political science", "Behavioral economics", "Biology", "Paleontology", "Politics", "Law"], "relevance": 89, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance) · 인용 1", "is_canon": false, "summary": {"summary": " 76", "abstract": "This study examines the relationship between startup growth and national drug discovery capability. Analysis of the countries of origin of compounds in US Phase 3 trials compared to those of FDA-approved drugs revealed growth in Asia, particularly in China. South Korea, Australia, and Canada also showed growth, whereas Japan, Germany, and the United Kingdom showed a declining number of drugs entering Phase 3 trials. National global drug discovery share growth and the proportion of post-2000 startups contributing to Phase 3 candidates were strongly correlated, underscoring the importance of a robust startup ecosystem. Post-2000 startups produced more compounds that use new modalities. The findings highlight important implications for innovation policy to strengthen national drug discovery capability, as well as for biopharmaceutical alliance and investment strategies.", "cited_by": 1, "concepts": ["Drug discovery", "Biopharmaceutical", "Business", "Investment (military)", "Alliance", "Drug industry", "Drug", "Drug development", "Phase (matter)", "Pharmaceutical industry", "Drug approval", "Venture capital", "Industrial organization", "Economic growth", "High tech", "International trade", "Pharmacology"], "relevance": 89, "reason": "키워드 3개 일치 (Venture Capital, Startup Growth, South Korea) · 인용 1", "is_canon": false, "summary": {"summary": "This study examines the relationship between startup growth and national drug discovery capability. Analysis of the countries of origin of compounds in US Phase 3 trials compared to those of FDA-approved drugs revealed growth in Asia, particularly in China.…", "key_result": "", "dependent_var": "", "independent_var": "스타트업 성장, 성장", "method": "", "caveats": ""}, "_key": "doi:10.1016/j.drudis.2025.104576", "tier": 3}, {"title": "Common Venture Capital Investors and Startup Growth", "doi": "10.1093/rfs/hhad071", "authors": ["Ofer Eldar", "Jillian Grennan"], "year": 2023, "venue": "Review of Financial Studies", "url": "https://doi.org/10.1093/rfs/hhad071", "abstract": "Abstract We exploit the staggered introduction of liability waivers when investors hold stakes in conflicting business opportunities as a shock to venture capital (VC) investment and director networks. After the law changes, we find increases in within-industry VC investment and common directors serving on startup boards. Despite the potential for rent extraction, same-industry startups inside VC portfolios benefit by raising more capital, failing less, and exiting more successfully. VC directors serving on other startup boards are the primary mechanism associated with positive outcomes, consistent with common VC investment facilitating informational exchanges in VC portfolios. Authors have furnished an Internet Appendix, which is available on the Oxford University Press Web site next to the link to the final published paper online.", "cited_by": 47, "concepts": ["Venture capital", "Business", "Investment (military)", "The Internet", "Liability", "Finance", "Exploit", "Capital (architecture)", "Start up", "Initial public offering", "Shock (circulatory)", "Investment banking", "Financial system", "Business administration", "Law", "Medicine", "World Wide Web", "History", "Archaeology", "Politics", "Internal medicine", "Political science", "Computer security", "Computer science"], "relevance": 89, "reason": "키워드 2개 일치 (Venture Capital, Startup Growth) · 핵심 저널 · 인용 47", "is_canon": false, "summary": {"summary": "After the law changes, we find increases in within-industry VC investment and common directors serving on startup boards.", "key_result": "After the law changes, we find increases in within-industry VC investment and common directors serving on startup boards.", "dependent_var": "exit", "independent_var": "market traction, 스타트업 성장, 성장, 이사회", "method": "", "caveats": ""}, "_key": "doi:10.1093/rfs/hhad071", "tier": 3}, {"title": "Blockchain-based entrepreneurial finance: success determinants of tourism initial co s show that the most essential signals of the probability of success of a tourism ICO are human capital, duration, acceptance of Bitcoin as the most popular cryptocurrency, and bonuses offered as an incentive instrument.", "key_result": "The results show that the most essential signals of the probability of success of a tourism ICO are human capital, duration, acceptance of Bitcoin as the most popular cryptocurrency, and bonuses offered as an incentive instrument.", "dependent_var": "", "independent_var": "신호", "method": "회귀분석", "caveats": ""}, "_key": "doi:10.1080/13683500.2021.1980505", "tier": 3}, {"title": "Entrepreneurial Finance in the Twenty-first Century, a Review of Factors Influencing Venture Capitalist’s Decision", "doi": "10.1177/09713557211025654", "authors": ["Ashish Vazirani", "Titas Bhattacharjee"], "year": 2021, "venue": "The Journal of Entrepreneurship", "url": "https://doi.org/10.1177/09713557211025654", "abstract": "Investments in new ventures are risky due to lack of conventional form of quantitative information and untested products. Venture capitalists (VCs) are seen to target such new ventures for high-risk premium but with little success. Existing research has investigated and identified a variety of qualitative factors that impact VCs’ investment decisions; however, many research gaps still exist. Works published in the last two decades show the evolution in the preference of factors with the focus shifting from venture’s team and product to factors such as intellectual property rights, economic crisis and social capital. It was found that the factor’s role was limited to the binary scale (positive and negative), which undermines its effect. The purpose of this review is to provide a comprehensive framework of factors that influence VCs’ investment decisions and show theoretical research gaps. Accordingly, we have segmented factors into two macro-categories: ‘internal’ and ‘external environment’, and presented a detailed framework of the fa y of firms to secure funding. The results suggest that the regulation may have worked as a screening and signaling device, allowing serious firms to remain active while deterring weaker entrants. The third paper investigates the collapse of FTX in 2022 and its consequences for venture investors. The results show a strong decline in early-stage investments among VCs that were previously active in the crypto sector, along with reduced syndication and lower exit opportunities. This demonstrates that scandals can generate sizable reputational costs that extend beyond the firm at the center of the event. Overall, the papers show that non-market forces can strongly influence entrepreneurial finance. They provide practical insights for investors and policymakers who aim to support the development of emerging technology ecosystems.", "cited_by": 0, "concepts": ["Venture capital", "Web syndication", "Silicon valley", "Entrepreneurship", "Business", "Economics", "Face (sociological concept)", "Entrepreneurial finance", "Industrial organization", "Social venture capital", "Market economy", "Finance", "New Ventures", "Capital (architecture)", "Compliance (psychology)", "Investment (military)", "Human capital", "Cluster (spacecraft)"], "relevance": 88, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance)", "is_canon": false, "summary": {"summary": "The findings show that U.S.", "key_result": "The findings show that U.S.", "dependent_var": "exit", "independent_var": "신호", "method": "이중차분(DiD)", "caveats": "DiD: 평행추세 가정 검토"}, "_key": "title:essaysonstrategystartupsandventurecapital", "tier": 3}, {"title": "Venture Capital Term Sheet", "doi": "10.1017/9781009537827.024", "authors": [], "year": 2026, "venue": null, "url": "https://doi.org/10.1017/9781009537827.024", "abstract": "Rigorously revised, with brand new chapters on additional private sources of funding, due diligence, sustainable finance, and deep tech investing, the second edition of this successful textbook pr 0005", "abstract": "This book offers a comprehensive and interdisciplinary guide to the dynamic field of entrepreneurial finance. It addresses the rapid diversification of financing instruments—ranging from venture capital and crowdfunding to blockchain-based models and government programs—while also tackling the rise of advanced research methods such as experiments, neuroscience, and AI. Originating from the 2023 ENTFIN Doctoral Colloquium, the book is designed to serve multiple audiences: early-career researchers, established scholars, policymakers, and educators. Each chapter provides a synthesis of current knowledge, identifies research gaps, and outlines future directions. By bridging the theoretical, methodological, and practical perspectives across disciplines, this volume aims to foster rigorous, innovative, and impactful research in entrepreneurial finance.", "cited_by": 0, "concepts": ["Field (mathematics)", "Economics", "Finance", "Business", "Entrepreneurship", "Entrepreneurial finance", "Work (physics)", "Key (lock)", "Production (economics)", "Engineering"], "relevance": 88, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance)", "is_canon": false, "summary": {"summary": "This book offers a comprehensive and interdisciplinary guide to the dynamic field of entrepreneurial finance. It addresses the rapid diversification of financing instruments—ranging from venture capital and crowdfunding to blockchain-based models and government programs—while also tackling the rise …", "key_result": "", "dependent_var": "", "independent_var": "", "method": "", "caveats": ""}, "_key": "doi:10.4337/9781035342501.00005", "tier": 3}, {"title": "Essays in entrepreneurial finance and innovation", "doi": "10.17918/00011431", "authors": ["Melissa Emily Crumling", "Michelle Lowry"], "year": 2026, "venue": null, "url": "https://doi.org/10.17918/00011431", "abstract": "Financial markets and innovation depend on the efficient flow of information, talent, and knowledge. However, information frictions often limit the ability of investors to identify promising opportunities, workers to match with productive firms, and firms to learn from one another. These frictions can distort the allocation of capital and talent, constrain entrepreneurship, and slow the diffusion of innovation throughout the economy. This dissertation examines three mechanisms through which such frictions are reduced: data technologies, social networks, and knowledge spillovers. Together, the essays show how improvements in information transmission reshape investment decisions, labor mobility, and innovative activity across firms and regions. The first essay studies whether data technologies reduce information frictions in venture capital markets. Venture capitalists play a central role in financing high-growth entrepreneurial firms, yet their investment decisions are often constrained by limited information and reliance on established geographic and industry networks. I examine whether the adoption of data platforms and artificial intelligence tools expands the set of startups that venture capitalists are able to identify and evaluate. Following adoption, venture capitalists increase investments outside their traditional geographic and industry specializations, directing capital toward startups that would have been less likely to receive financing through conventional network-based sourcing channels. These out-of-network investments exhibit similar or stronger performance than comparable in-network investments and are more likely to achieve successful exits once they reach later financing stages. The findings suggest that data technologies improve the discovery of entrepreneurial opportunities and expand access to venture financing beyond established innovation hubs. The second essay examines how social networks influence the geographic allocation of innovative talent. Using changes in the enforceability of non-compete agreements, we study how labor mobility restrictions affect the relocation decisions of inventors and the regions that ultimately benefit from their movement. We show that inventors respond to stronger non-compete enforcement by relocating to distant regions where they possess stronger social connections. Regions with greater social proximity to affected inventors subsequently experience increases in inventor employment, patenting activity, entrepreneurial entry, and venture financing. These gains are concentrated among young firms, where information asymmetries are high and social ties play an important role in connecting firms with potential employees. The results highlight how informal social networks facilitate the movement of human capital and transmit the effects of local labor market shocks across geographic boundaries. The third essay examines how knowledge generated by young private firms influences innovation by established public companies. While research has traditionally studied innovation within either public or private firms, less is known about how knowledge flows between them. I construct a novel measure of technology spillovers from entrepreneurial and venture capital-backed firms to public firms based on overlap in technological capabilities and inventor resources. Public firms exposed to greater spillovers subsequently produce more patents, receive more citations, and generate more novel innovations. The effects are strongest for spillovers originating from venture capital-backed firms and operate through inventor hiring and acquisitions of innovative startups. These findings demonstrate that knowledge created by entrepreneurial firms extends beyond the firms themselves and contributes to innovation among established incumbents. Taken together, the essays demonstrate that reductions in information frictions have important consequences for the allocation of capital, talent, and innovative activity. Data technologies help investors discover opportunities outside traditional networks, social connections facilitate the movement of skilled workers across regions, and knowledge spillovers transmit innovation from entrepreneurial firms to established corporations. By examining these mechanisms in a unified framework, this dissertation provides evidence that the diffusion of information and ideas plays a central role in shaping entrepreneurial finance, labor mobility, and technological progress.", "cited_by": 0, "concepts": ["Venture capital", "Investment (military)", "Finance", "Social venture capital", "Entrepreneurial finance", "Economics", "Business", "Entrepreneurship", "Capital (architecture)", "Human capital", "Industrial organization", "Set (abstract data type)", "Financial innovation", "Information technology", "Social capital", "Information transmission", "Financial capital", "Panel data", "Initial public offering", "Investment decisions", "Impact investing", "Financial market", "External financing", "Market economy", "Production (economics)", "High tech", "Capital market", "Labour economics"], "relevance": 88, "reason": "키워드 2개 일치 (Venture Capital, Entrepreneurial Finance)", "is_canon": false, "summary": {"summary": "The findings suggest that data technologies improve the discovery of entrepreneurial opportunities and expand access to venture financing beyond established innovation hubs.", "key_result": "The findings suggest that data technologies improve the discovery of entrepreneurial opportunities and expand access to venture financing beyond established innovation hubs.", "dependent_var": "exit, M&A", "independent_var": "성장", "method": "", "caveats": ""}, "_key": "doi:10.17918/00011431", "tier": 3}, {"title": "Strategies for Optimizing Entrepreneurial Financing Channels for College Students", "doi": "10.54254/2754-1169/2026.ld31469", "authors": ["Yanuo Lyu"], "year": 2026, "venue": "Advances in Economics Management and Political Sciences", "url": "https://doi.org/10.54254/2754-1169/2026.ld31469", "abstract": "Under the dual contexts of the con function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function tierBadge(d){
  if(d.tier==='F') return '<span class="badge canon">Foundational</span>';
  if(d.tier) return `<span class="badge t${d.tier}">Tier ${d.tier}</span>`;
  return '';
}
function cardHtml(d){
  const su = d.summary||{};
  const authors = (d.authors||[]).slice(0,4).join(', ') + ((d.authors||[]).length>4?' 외':'');
  return `<div class="card">
    <h2>${esc(d.title)} ${tierBadge(d)}<span class="badge">관련도 ${d.relevance||0}</span></h2>
    <div class="row">${esc(d.venue||'NA')} (${d.year||'NA'}) · ${esc(authors)} · 인용 ${d.cited_by||0}${d.doi?` · <a href="${esc(d.url)}" target="_blank">DOI</a>`:''}</div>
    ${su.summary?`<div class="kv">${esc(su.summary)}</div>`:''}
    ${su.key_result?`<div class="kv"><b>핵심 결과</b> ${esc(su.key_result)}</div>`:''}
    ${su.dependent_var?`<div class="kv"><b>종속변수</b> ${esc(su.dependent_var)}</div>`:''}
    ${su.independent_var?`<div class="kv"><b>독립변수</b> ${esc(su.independent_var)}</div>`:''}
    ${su.method?`<div class="kv"><b>방법</b> ${esc(su.method)}</div>`:''}
    ${su.caveats?`<div class="kv caveat"><b>⚠️ 유의점</b> ${esc(su.caveats)}</div>`:''}
    ${d.reason?`<div class="kv" style="color:var(--mut)"><b>선정 이유</b> ${esc(d.reason)}</div>`:''}
    ${d.abstract?`<div class="en"><b>Abstract.</b> ${esc(d.abstract)}</div>`:''}
  </div>`;
}

const list=document.getElementById('list'), q=document.getElementById('q'),
      sortSel=document.getElementById('sort'), tierSel=document.getElementById('tier'),
      countEl=document.getElementById('count');
function render(){
  const term=q.value.toLowerCase().trim(), tf=tierSel.value;
  let rows=DATA.slice();
  if(tf) rows=rows.filter(d=>String(d.tier)===tf);
  if(term) rows=rows.filter(d=>[d.title,d.venue,(d.summary&&d.summary.summary),(d.concepts||[]).join(' '),(d.authors||[]).join(' ')].join(' ').toLowerCase().includes(term));
  const s=sortSel.value;
  rows.sort((a,b)=> s==='year'?(b.year||0)-(a.year||0) : s==='cited'?(b.cited_by||0)-(a.cited_by||0) : (b.relevance||0)-(a.relevance||0));
  countEl.textContent=rows.length+'편 표시';
  list.innerHTML=rows.map(cardHtml).join('')||'<p style="color:var(--mut)">조건에 맞는 논문이 없습니다.</p>';
}
q.oninput=render; sortSel.onchange=render; tierSel.onchange=render;
document.getElementById('toggle-en').onclick=(e)=>{document.body.classList.toggle('show-en');e.target.textContent=document.body.classList.contains('show-en')?'EN 초록 숨기기':'EN 초록 보기';};
render();
