# 연구 프로필 — Claude 관련도 랭킹·요약·검색 쿼리의 단일 진실 원천(SSOT).
# 자유롭게 수정하세요. 키워드/저널을 바꾸면 다음 실행부터 반영됩니다.

researcher: |
  한국 기반의 스타트업 모험자본(venture capital)·투자 시장 연구자.
  종속변수(DV)는 주로 후속투자(follow-on investment)·단계적 투자(staged financing)
  등 투자 관련 결과변수. 최근 가장 관심 있는 독립변수(IV)는 market traction.
  특정 국가의 연구 설계·결론을 한국 시장에 적용·확장하는 연구에 관심이 많음.

# 종속변수 / 독립변수 — Claude가 각 논문에서 이 변수들의 존재/관련성을 평가
dependent_variables:
  - follow-on investment / 후속투자
  - staged financing / 단계적 투자
  - investment amount / valuation / 투자 규모·기업가치
  - survival / exit (IPO, M&A)
independent_variables:
  - market traction (사용자·매출·성장 지표)
  - startup growth
  - corporate governance
  - machine learning 기반 신호·예측

# 검색 키워드 — OpenAlex/S2 쿼리에 사용. 1차 키워드 스코어에도 사용.
keywords:
  - Venture Capital
  - Entrepreneurial Finance
  - Corporate Governance
  - Follow-on Investment
  - Staged Financing
  - Startup Growth
  - Machine Learning
  - South Korea
  - market traction

# 핵심 키워드 — 가중치 2배. 이 중 하나만 걸려도 후보로 채택(연구 정체성에 직결).
# 나머지(거버넌스·ML·한국·성장)는 단독 1개만으론 잡음으로 보고 제외.
core_keywords:
  - market traction
  - Follow-on Investment
  - Staged Financing
  - Entrepreneurial Finance
  - Venture Capital

# 저널 allowlist (선택). 비우면 모든 저널 허용. OpenAlex source 이름과 부분일치.
# 채워두면 1차 스코어에 가산점(allowlist 외 논문도 LLM 단계까지는 통과 가능).
journal_allowlist:
  - Journal of Business Venturing
  - Strategic Management Journal
  - Research Policy
  - Journal of Finance
  - Review of Financial Studies
  - Journal of Financial Economics
  - Management Science
  - Journal of Corporate Finance
  - Small Business Economics
  - Entrepreneurship Theory and Practice
  - Journal of Management
  - Venture Capital

# 연도 cutoff
year_from: 2013          # 종합 백필 시작 연도 (시작판). Da Rin·Hellmann·Puri(2013) 기점.
recent_window_years: 0   # 0이면 미사용. >0이면 주간/월간에서 (현재연도 - N) 이후만.

# 랭킹/요약 파라미터 (LLM 미사용 — 가중 키워드·인용·최신성 휴리스틱)
ranking:
  core_weight: 2           # 핵심 키워드 1개당 가중치(일반은 1)
  min_weight: 2            # prefilter 채택 기준(가중합). 핵심 1개=2 → 통과, 일반 1개=1 → 제외
  saturate_weight: 5       # 가중합이 이 값이면 관련도 기본점 100 도달
  keyword_top_n: 800       # prefilter 상위 컷. 넉넉히 잡아 누락 방지
  relevance_threshold: 80  # 0~100. 엄격 — 이 점수 이상만 전달 (canon은 무조건 통과)
  weekly_max: 20           # 주간 1회 전달 상한(알림·Zotero·아카이브 공통). 초과분은 폐기
  weekly_highlight_n: 10   # 텔레그램 주간 알림에 요약 실을 상위 논문 수(평균 ~10)
  retidy_max: 200          # 일회성 retidy 도구에서만 사용하는 최대 편수
  tier1_size: 25           # Tier 1(최우선 정독) 편수
  tier2_size: 75           # Tier 2 편수(이후는 Tier 3)
  per_keyword_fetch: 400   # 키워드별 OpenAlex 수집량
