name: Backfill (one-time)

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "랭킹 후보 제한 (비우면 전체)"
        required: false
        default: ""
      skip_llm:
        description: "Claude 미사용(true=무료 검증)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: paper-archive-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run backfill
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
          ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
          ZOTERO_COLLECTION_KEY: ${{ secrets.ZOTERO_COLLECTION_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          ARGS=""
          [ -n "${{ inputs.limit }}" ] && ARGS="$ARGS --limit ${{ inputs.limit }}"
          [ "${{ inputs.skip_llm }}" = "true" ] && ARGS="$ARGS --skip-llm"
          python entrypoints/backfill.py $ARGS
      - name: Commit archive state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state site exports
          git diff --staged --quiet || git commit -m "backfill: initial archive [skip ci]"
          git push
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
